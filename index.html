<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>무쌍기 — 無雙記</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  :root{ --gold:#e8c05a; --shu:#3f8f5f; --wei:#4a6fa5; --wu:#c0392b; --other:#8e7cc3; }
  html,body{ height:100%; background:#0a0806; overflow:hidden; overscroll-behavior:none;
    font-family:-apple-system,"Noto Sans KR","Malgun Gothic",sans-serif; color:#f3e9d2; touch-action:none; }
  #app{ position:fixed; inset:0; touch-action:none; }
  canvas{ display:block; width:100%; height:100%; background:#1a1208; }

  .screen{ position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    z-index:20; padding:16px; text-align:center; }
  .screen.on{ display:flex; }
  .brush-title{ font-size:64px; font-weight:900; letter-spacing:8px; line-height:1;
    background:linear-gradient(180deg,#f6e4a8,#c99a3a); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 4px 30px rgba(200,150,50,.4); }
  .sub-title{ font-size:15px; color:#b09a72; margin-top:8px; letter-spacing:4px; }
  .menu-btn{ margin-top:26px; padding:15px 46px; font-size:21px; font-weight:700; color:#1a1410;
    background:linear-gradient(180deg,#f0d382,#d0a444); border:none; border-radius:12px;
    box-shadow:0 6px 0 #8a6a20, 0 10px 20px rgba(0,0,0,.4); cursor:pointer; }
  .menu-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #8a6a20; }
  .menu-btn.sm{ font-size:15px; padding:11px 30px; margin-top:12px;
    background:linear-gradient(180deg,#4a4038,#332b24); color:#e8dcc0; box-shadow:0 4px 0 #1a1410; }

  /* 무장 선택 — 그리드로 고정, 글자 잘림 방지 */
  #selectScreen{ justify-content:flex-start; padding:14px 12px; overflow-y:auto; }
  #shopScreen{ justify-content:flex-start; padding:18px 14px; overflow-y:auto; }
  .shop-row{ display:flex; align-items:center; gap:12px; width:100%; max-width:520px;
    background:rgba(30,22,16,.92); border:2px solid #3a2e22; border-radius:12px; padding:12px 14px; margin:7px 0; }
  .shop-ic{ font-size:30px; flex:0 0 auto; }
  .shop-info{ flex:1; text-align:left; min-width:0; }
  .shop-name{ font-size:16px; font-weight:800; }
  .shop-desc{ font-size:12.5px; color:#b8a878; margin-top:2px; }
  .shop-buy{ flex:0 0 auto; font-size:15px; font-weight:800; padding:9px 14px; border-radius:9px;
    border:2px solid var(--gold); background:rgba(255,208,80,.15); color:#ffd050; cursor:pointer; }
  .shop-buy.nope{ opacity:.4; border-color:#5a4a30; color:#9a8666; cursor:not-allowed; }
  .shop-buy.maxed{ border-color:#5a7a4a; color:#8ac06a; background:rgba(90,120,74,.15); cursor:default; }
  .sel-head{ font-size:24px; font-weight:800; color:var(--gold); }
  .sel-sub{ font-size:13px; color:#9a8666; margin:4px 0 12px; }
  .hero-grid{ display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px;
    width:100%; max-width:560px; }
  .hero-card{ background:rgba(30,22,16,.92); border:2px solid #3a2e22; border-radius:14px;
    padding:0 0 10px; cursor:pointer; transition:transform .1s,border-color .1s; min-width:0;
    display:flex; flex-direction:column; align-items:center; text-align:center; overflow:hidden; }
  .hero-card:active{ transform:scale(.96); }
  .hero-card:hover{ border-color:var(--gold); }
  .hero-portrait{ position:relative; width:100%; aspect-ratio:1/1; margin:0; flex:0 0 auto; overflow:hidden;
    border-bottom:2px solid #3a2e22; background:radial-gradient(ellipse at 50% 40%,#2a2016,#15100a); }
  .fac-badge{ position:absolute; top:6px; left:6px; z-index:2; width:24px; height:24px; border-radius:6px;
    display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:900; color:#fff;
    box-shadow:0 1px 4px rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.3); }
  .hero-portrait img{ width:100%; height:100%; object-fit:cover; display:block; }
  .hero-portrait svg{ display:block; width:100% !important; height:100% !important; }
  .hp-nm{ font-size:19px; font-weight:900; margin-top:8px; }
  .hp-wpn{ font-size:12.5px; color:var(--gold); margin-top:3px; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hp-ult{ font-size:11.5px; color:#d8a8e8; margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hp-stat{ font-size:11px; color:#9a8666; margin-top:5px; }

  /* HUD */
  #hud{ position:absolute; inset:0; z-index:10; pointer-events:none; display:none; }
  #hud.on{ display:block; }
  .top-bar{ position:absolute; top:0; left:0; right:0; padding:8px 14px; }
  .xp-track{ height:9px; background:rgba(0,0,0,.55); border:1px solid #3a2e22; border-radius:5px; overflow:hidden; }
  .xp-fill{ height:100%; background:linear-gradient(90deg,#4a9fe8,#7ac0ff); width:0%; transition:width .15s; }
  .top-info{ display:flex; justify-content:space-between; align-items:center; margin-top:4px; font-size:13px; font-weight:800; }
  .lvl-badge{ color:var(--gold); }
  .timer{ color:#f3e9d2; font-variant-numeric:tabular-nums; }
  .kills{ color:#e8756a; }
  .hp-track{ position:absolute; bottom:12px; left:14px; width:min(38vw,260px); height:14px;
    background:rgba(0,0,0,.55); border:1px solid #3a2e22; border-radius:7px; overflow:hidden; }
  .hp-fill{ height:100%; background:linear-gradient(90deg,#c0392b,#e35d4d); width:100%; transition:width .2s; }
  .hp-label{ position:absolute; bottom:28px; left:14px; font-size:12px; color:#e8a0a0; font-weight:700; }

  /* 스킬 버튼 그룹 (우하단) */
  .skill-group{ position:absolute; bottom:12px; right:12px; display:flex; align-items:flex-end; gap:10px; pointer-events:none; }
  .skill-btn{ position:relative; border-radius:50%; overflow:hidden; pointer-events:none; cursor:pointer;
    touch-action:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .skill-btn .sb-ic{ font-size:24px; z-index:2; }
  .skill-btn .sb-nm{ font-size:9px; font-weight:800; color:#c9b78c; z-index:2; margin-top:-2px; }
  .skill-btn .sb-cd{ position:absolute; left:0; right:0; bottom:0; background:rgba(0,0,0,.55); z-index:1; height:0%; transition:height .1s linear; }
  .skill-btn.s1{ width:60px; height:60px; background:radial-gradient(circle at 40% 35%,#3a5a8a,#1a2a44); border:2px solid #3a4a6a; }
  .skill-btn.s2{ width:60px; height:60px; background:radial-gradient(circle at 40% 35%,#8a4a3a,#442018); border:2px solid #6a3a2a; }
  .skill-btn.ult{ width:94px; height:94px; background:radial-gradient(circle at 40% 35%,#6a5230,#2a1e10); border:3px solid #4a3a22; }
  .skill-btn.ult .sb-ic{ font-size:38px; }
  .skill-btn.ult .sb-nm{ font-size:12px; }
  .skill-btn.ready{ animation:sbPulse 1s infinite; }
  .skill-btn.s1.ready{ border-color:#7ac0ff; box-shadow:0 0 14px rgba(122,192,255,.6); }
  .skill-btn.s1.ready .sb-nm{ color:#7ac0ff; }
  .skill-btn.s2.ready{ border-color:#ff9a6a; box-shadow:0 0 14px rgba(255,154,106,.6); }
  .skill-btn.s2.ready .sb-nm{ color:#ff9a6a; }
  .skill-btn.ult.ready{ border-color:var(--gold); box-shadow:0 0 28px rgba(232,192,90,.9), inset 0 0 20px rgba(232,192,90,.4);
    animation:ultReadyPulse .8s infinite; }
  .skill-btn.ult.ready .sb-nm{ color:var(--gold); }
  .skill-btn.ult.ready::before{ content:''; position:absolute; inset:-6px; border-radius:50%;
    border:2px dashed var(--gold); animation:ultSpin 3s linear infinite; opacity:.7; }
  @keyframes ultReadyPulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
  @keyframes ultSpin{ from{transform:rotate(0)} to{transform:rotate(360deg)} }
  #toast{ position:absolute; top:64px; left:50%; transform:translateX(-50%); z-index:19; pointer-events:none;
    background:rgba(20,14,10,.92); border:1px solid var(--gold); border-radius:10px; padding:8px 18px;
    font-size:14px; font-weight:700; color:#f0e0b0; opacity:0; white-space:nowrap; }
  #toast.go{ animation:toastAnim 2s ease-out; }
  @keyframes toastAnim{ 0%{opacity:0;transform:translate(-50%,-8px)} 12%,72%{opacity:1;transform:translate(-50%,0)} 100%{opacity:0;transform:translate(-50%,-8px)} }

  /* 시나리오 스토리 화면 */
  #storyScreen, #clearScreen{ position:absolute; inset:0; z-index:30; display:none;
    align-items:center; justify-content:center; padding:20px; text-align:center;
    background:radial-gradient(ellipse at 50% 40%, #241810, #0a0604 80%); }
  #storyScreen.on, #clearScreen.on{ display:flex; }
  .story-inner, .clear-inner{ max-width:600px; animation:storyIn .6s ease-out; }
  @keyframes storyIn{ 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
  .story-chapter{ font-size:20px; color:var(--gold); letter-spacing:8px; font-weight:800; }
  .story-title{ font-size:40px; font-weight:900; margin:8px 0 20px; letter-spacing:4px;
    background:linear-gradient(180deg,#f6e4a8,#c99a3a); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .story-intro{ font-size:17px; color:#e8dcc0; line-height:1.9; white-space:pre-line; margin-bottom:22px; }
  .story-goal{ font-size:15px; color:#c9a05a; font-weight:700; border:1px solid #5a4a30; border-radius:10px;
    padding:10px 18px; display:inline-block; margin-bottom:28px; }
  .story-tap{ font-size:15px; color:#9a8666; animation:tapBlink 1.4s infinite; }
  @keyframes tapBlink{ 0%,100%{opacity:.4} 50%{opacity:1} }
  .clear-stamp{ font-size:64px; font-weight:900; color:var(--wu); border:5px solid var(--wu); border-radius:16px;
    display:inline-block; padding:6px 28px; transform:rotate(-8deg); letter-spacing:8px;
    text-shadow:0 0 20px rgba(192,57,43,.5); box-shadow:0 0 24px rgba(192,57,43,.3); margin-bottom:20px; }
  .clear-title{ font-size:34px; font-weight:900; color:var(--gold); margin-bottom:8px; }
  .clear-sub{ font-size:16px; color:#b09a72; margin-bottom:28px; }

  /* 보스 체력바 (상단) */
  #bossHpWrap{ position:absolute; top:44px; left:50%; transform:translateX(-50%); width:min(70%,420px); z-index:11;
    display:none; text-align:center; }
  #bossHpWrap.on{ display:block; }
  #bossHpName{ font-size:14px; font-weight:800; color:#e8756a; margin-bottom:3px; text-shadow:0 1px 3px #000; }
  #bossHpTrack{ height:12px; background:rgba(0,0,0,.6); border:1px solid #6a2a20; border-radius:6px; overflow:hidden; }
  #bossHpFill{ height:100%; background:linear-gradient(90deg,#c0392b,#e8756a); width:100%; transition:width .2s; }
  @keyframes sbPulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

  /* 조이스틱 (시각 표시만, 터치는 #app이 처리) */
  #joyBase{ position:absolute; width:130px; height:130px; border-radius:50%; border:2px solid rgba(232,192,90,.3);
    background:rgba(0,0,0,.2); display:none; z-index:9; pointer-events:none; }
  #joyStick{ position:absolute; width:54px; height:54px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, rgba(232,192,90,.7), rgba(140,110,50,.5)); display:none; z-index:9; pointer-events:none; }

  /* 레벨업 */
  #levelupScreen{ background:rgba(10,6,4,.92); }
  .lvl-head{ font-size:34px; font-weight:900; color:var(--gold); text-shadow:0 0 20px rgba(232,192,90,.5); }
  .lvl-sub{ font-size:15px; color:#b09a72; margin:5px 0 18px; }
  .upgrade-row{ display:flex; gap:12px; width:100%; max-width:760px; justify-content:center; flex-wrap:wrap; }
  .up-card{ flex:1; min-width:150px; max-width:230px; background:rgba(30,22,16,.95); border:2px solid #4a3a28; border-radius:16px;
    padding:18px 14px; cursor:pointer; transition:transform .1s,border-color .1s; position:relative; }
  .up-card:active{ transform:scale(.96); }
  .up-card .up-ic{ font-size:38px; }
  .up-card .up-t{ font-size:18px; font-weight:800; margin-top:5px; }
  .up-card .up-d{ font-size:13px; color:#c9b78c; margin-top:7px; line-height:1.4; }
  .up-card .up-lv{ position:absolute; top:9px; right:11px; font-size:11px; font-weight:800; color:#9a8666; }
  .up-card.rar-r{ border-color:#4a9fe8; }
  .up-card.rar-e{ border-color:#c07ae8; box-shadow:0 0 16px rgba(192,122,232,.3); }
  .up-card.evo-card{ border-color:#ffd050; border-width:3px;
    background:linear-gradient(160deg, rgba(60,45,20,.97), rgba(30,22,10,.97));
    box-shadow:0 0 26px rgba(255,208,80,.5); animation:evoGlow 1.2s ease-in-out infinite; }
  @keyframes evoGlow{ 0%,100%{box-shadow:0 0 20px rgba(255,208,80,.4)} 50%{box-shadow:0 0 34px rgba(255,208,80,.7)} }

  /* 결과 */
  .result-title{ font-size:60px; font-weight:900; letter-spacing:6px; }
  .result-title.win{ background:linear-gradient(180deg,#f6e4a8,#c99a3a); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .result-title.lose{ color:#7a6a5a; }
  .result-stat{ font-size:15px; color:#b09a72; margin-top:14px; line-height:2; }

  /* 필살기/기술 풀스크린 연출 */
  #fxFlash{ position:absolute; inset:0; z-index:15; pointer-events:none; opacity:0;
    background:radial-gradient(circle at center, rgba(255,240,200,.7), rgba(232,150,60,.3) 50%, transparent 75%); }
  #fxFlash.go{ animation:fxFl .6s ease-out; }
  @keyframes fxFl{ 0%{opacity:0;transform:scale(.3)} 20%{opacity:1} 100%{opacity:0;transform:scale(1.8)} }
  #fxName{ position:absolute; top:34%; left:50%; transform:translate(-50%,-50%); z-index:16; pointer-events:none;
    font-size:52px; font-weight:900; color:var(--gold); text-shadow:0 0 30px rgba(232,192,90,.8),0 4px 8px #000;
    opacity:0; white-space:nowrap; letter-spacing:4px; }
  #fxName.go{ animation:fxNm 1.1s ease-out; }
  @keyframes fxNm{ 0%{opacity:0;transform:translate(-50%,-50%) scale(2)} 25%{opacity:1;transform:translate(-50%,-50%) scale(1)} 75%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)} }

  /* 100킬 마일스톤 대형 메시지 */
  #bigMsg{ position:absolute; top:42%; left:50%; transform:translate(-50%,-50%); z-index:18; pointer-events:none;
    text-align:center; opacity:0; }
  #bigMsg.go{ animation:bigMsgAnim 1.6s cubic-bezier(.2,.8,.2,1); }
  #bigMsg .bm-sub{ font-size:22px; font-weight:800; color:#fff; letter-spacing:6px; margin-bottom:2px;
    text-shadow:0 2px 8px #000; }
  #bigMsg .bm-main{ font-size:72px; font-weight:900; letter-spacing:4px; white-space:nowrap;
    background:linear-gradient(180deg,#fff2c0,#e8a53a 60%,#c0392b);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(232,120,50,.7); -webkit-text-stroke:2px rgba(80,20,10,.4); }
  @keyframes bigMsgAnim{
    0%{opacity:0;transform:translate(-50%,-50%) scale(2.4) rotate(-4deg)}
    18%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}
    30%{transform:translate(-50%,-50%) scale(1.08)}
    75%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
  }
  /* 크리티컬 비네트 */
  #critVig{ position:absolute; inset:0; z-index:14; pointer-events:none; opacity:0;
    box-shadow:inset 0 0 120px 40px rgba(200,40,20,.6); }
  #critVig.go{ animation:critV .5s ease-out; }
  @keyframes critV{ 0%{opacity:0} 20%{opacity:1} 100%{opacity:0} }

  /* 적장 등장 연출 */
  #bossIntro{ position:absolute; inset:0; z-index:22; pointer-events:none; display:none;    flex-direction:column; align-items:center; justify-content:center; background:rgba(6,4,2,.55); }
  #bossIntro.on{ display:flex; }
  .bi-band{ position:absolute; left:0; right:0; height:130px; top:50%; transform:translateY(-50%);
    background:linear-gradient(90deg, transparent, rgba(20,10,6,.92) 20%, rgba(20,10,6,.92) 80%, transparent);
    display:flex; align-items:center; justify-content:center; gap:20px;
    border-top:2px solid var(--gold); border-bottom:2px solid var(--gold);
    transform:translateY(-50%) scaleX(0); animation:biBand .5s ease-out forwards; }
  @keyframes biBand{ to{ transform:translateY(-50%) scaleX(1); } }
  .bi-portrait{ width:96px; height:96px; filter:drop-shadow(0 0 12px rgba(0,0,0,.6));
    border-radius:12px; overflow:hidden; flex:0 0 auto; }
  .bi-portrait img{ border-radius:12px; }
  .bi-txt{ text-align:left; }
  .bi-name{ font-size:34px; font-weight:900; letter-spacing:2px; }
  .bi-quote{ font-size:16px; color:#e8dcc0; margin-top:6px; max-width:420px; }
  .bi-title{ font-size:13px; color:var(--gold); font-weight:700; margin-bottom:2px; }

  #verTag{ position:absolute; bottom:12px; right:14px; font-size:12px; color:#7a6a4a; letter-spacing:1px; z-index:5; }
  #hudVer{ position:absolute; bottom:6px; right:8px; font-size:10px; color:rgba(180,150,100,.45); letter-spacing:1px; z-index:11; pointer-events:none; text-shadow:0 1px 2px rgba(0,0,0,.6); }

  /* 콤보 카운터 */
  #comboBox{ position:fixed; top:22%; right:5%; z-index:23; pointer-events:none;
    display:none; flex-direction:column; align-items:flex-end; line-height:.9;
    text-shadow:0 2px 6px #000; transform-origin:right center; }
  #comboBox.show{ display:flex; }
  #comboBox .cb-n{ font-size:48px; font-weight:900; color:#fff; }
  #comboBox .cb-x{ font-size:16px; font-weight:800; color:#ffd050; letter-spacing:3px; }
  #comboBox.t1 .cb-n{ color:#ffe680; }
  #comboBox.t2 .cb-n{ color:#ff9a4a; font-size:56px; }
  #comboBox.t3 .cb-n{ color:#ff5a4a; font-size:66px; }
  #comboBox.pop{ animation:comboPop .25s ease-out; }
  @keyframes comboPop{ 0%{transform:scale(1.4)} 60%{transform:scale(.92)} 100%{transform:scale(1)} }

  /* 웨이브 이벤트 알림 */
  #eventToast{ position:fixed; top:16%; left:50%; transform:translateX(-50%) scale(.8);
    z-index:24; pointer-events:none; opacity:0; font-size:26px; font-weight:900; letter-spacing:2px;
    color:#ffd84a; text-shadow:0 2px 8px #000, 0 0 20px rgba(255,180,60,.6); white-space:nowrap;
    padding:8px 22px; background:rgba(20,10,6,.6); border-radius:30px; border:2px solid rgba(255,180,60,.5); }
  #eventToast.go{ animation:evtToast 2.4s ease-out forwards; }
  @keyframes evtToast{ 0%{opacity:0;transform:translateX(-50%) scale(.7)}
    12%{opacity:1;transform:translateX(-50%) scale(1.05)} 20%{transform:translateX(-50%) scale(1)}
    80%{opacity:1} 100%{opacity:0;transform:translateX(-50%) scale(1)} }

  /* 필살기 컷인 — 무장 초상화가 확 들어오는 연출 */
  #ultCutin{ position:absolute; inset:0; z-index:26; pointer-events:none; display:none;
    align-items:center; justify-content:flex-start; overflow:hidden; }
  #ultCutin.go{ display:flex; }
  #ultCutin .uc-flash{ position:absolute; inset:0;
    background:radial-gradient(ellipse at 30% 50%, rgba(255,220,120,.5), transparent 60%);
    animation:ucFlash .5s ease-out forwards; }
  @keyframes ucFlash{ 0%{opacity:0} 15%{opacity:1} 100%{opacity:0} }
  #ultCutin .uc-portrait{ width:min(42vw,300px); height:min(42vw,300px); margin-left:-4vw;
    filter:drop-shadow(6px 0 24px rgba(0,0,0,.7)) drop-shadow(0 0 30px rgba(255,200,100,.4));
    transform:translateX(-120%) skewX(-8deg); animation:ucSlide .85s cubic-bezier(.2,1.3,.4,1) forwards; }
  #ultCutin .uc-portrait img{ width:100%; height:100%; object-fit:contain; }
  @keyframes ucSlide{ 0%{transform:translateX(-120%) skewX(-8deg);opacity:0}
    18%{transform:translateX(-6%) skewX(-8deg);opacity:1}
    72%{transform:translateX(-6%) skewX(-8deg);opacity:1}
    100%{transform:translateX(-14%) skewX(-8deg);opacity:0} }
  #ultCutin .uc-name{ position:absolute; left:min(38vw,290px); top:38%; font-size:min(9vw,52px); font-weight:900;
    letter-spacing:4px; text-shadow:0 3px 12px #000; transform:translateX(60px); opacity:0;
    animation:ucText .85s ease-out .12s forwards; }
  #ultCutin .uc-skill{ position:absolute; left:min(38vw,290px); top:calc(38% + min(9vw,52px) + 6px);

<script>
/* =========================================================
   무장 — 기본공격 + 기술1 + 기술2 + 필살기
   ========================================================= */
const FAC_COLOR={"촉":"#3f8f5f","위":"#4a6fa5","오":"#c0392b","기타":"#8e7cc3"};

/* 게임 버전 — 한 곳에서 관리. 타이틀/HUD에 자동 표시 */
const GAME_VER = "v3.8";
window.addEventListener('DOMContentLoaded', ()=>{
  const vt=document.getElementById('verTag'); if(vt) vt.textContent=GAME_VER;
  const hv=document.getElementById('hudVer'); if(hv) hv.textContent=GAME_VER;

/* =========================================================
   BGM — Web Audio 절차적 배경음악 (동양풍 5음계)
   ========================================================= */
const BGM = {
  ctx:null, master:null, playing:false, timer:null, step:0, mode:'menu',
  init(){
    if(this.ctx) return;
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.32;
      this.master.connect(this.ctx.destination);
    }catch(e){ this.ctx=null; }
  },
  // 음 하나 (관악/현악 느낌)
  note(freq, t, dur, type, vol){
    if(!this.ctx) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type||'triangle'; o.frequency.value=freq;
    o.connect(g); g.connect(this.master);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol||0.2, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.start(t); o.stop(t+dur+0.05);
  },
  // 드럼 (전투용)
  drum(t, vol){
    if(!this.ctx) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(50, t+0.12);
    o.connect(g); g.connect(this.master);
    g.gain.setValueAtTime(vol||0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
    o.start(t); o.stop(t+0.2);
  },
  start(mode){
    this.init(); if(!this.ctx) return;
    if(this.ctx.state==='suspended') this.ctx.resume();
    this.mode=mode||'menu'; this.step=0;
    if(this.playing) return;
    this.playing=true;
    this.master.gain.setTargetAtTime(mode==='battle'?0.28:0.22, this.ctx.currentTime, 0.5);
    this.loop();
  },
  faction:'촉',   // 현재 진영 (진영별 곡조)
  // 진영별 곡 데이터: {멜로디(전투), 멜로디(메뉴), 음색, 템포보정}
  tunes:{
    촉:{ battle:[0,2,4,5,4,2,4,7, 5,4,2,4,5,7,5,4], menu:[0,2,4,5,4,2,0,4], wave:'triangle', tempo:1.0, drumV:0.38 },
    위:{ battle:[0,3,2,5,3,2,5,3, 0,5,3,2,7,5,3,0], menu:[0,3,2,0,3,5,3,2], wave:'sawtooth', tempo:0.9, drumV:0.5 },
    오:{ battle:[2,4,5,4,2,4,5,7, 5,4,2,0,2,4,5,4], menu:[2,4,5,7,5,4,2,4], wave:'triangle', tempo:1.05, drumV:0.32 },
    기타:{ battle:[0,3,4,3,5,4,7,4, 0,4,3,7,4,3,0,3], menu:[0,4,3,0,4,3,7,4], wave:'square', tempo:0.85, drumV:0.55 },
  },
  loop(){
    if(!this.playing||!this.ctx) return;
    const penta=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
    const bass =[130.81,146.83,164.81,196.00];
    const t=this.ctx.currentTime;
    const battle=this.mode==='battle';
    const tune=this.tunes[this.faction]||this.tunes['촉'];
    const stepDur=(battle?0.28:0.42)*tune.tempo;
    const s=this.step;
    const melScale=battle?tune.battle:tune.menu;
    const mi=melScale[s%melScale.length];
    this.note(penta[mi], t, stepDur*0.9, battle?tune.wave:'triangle', battle?0.14:0.16);
    if(s%2===0) this.note(penta[mi]*1.5, t, stepDur*0.8, 'triangle', 0.06);
    if(s%2===0) this.note(bass[(Math.floor(s/2))%bass.length], t, stepDur*1.6, 'sine', battle?0.18:0.12);
    if(battle){ this.drum(t, tune.drumV); if(s%2===1) this.drum(t+stepDur*0.5, tune.drumV*0.5); }
    this.step++;
    this.timer=setTimeout(()=>this.loop(), stepDur*1000);
  },
  setFaction(fac){ this.faction=fac||'촉'; },
  setMode(mode){
    if(this.mode===mode) return;
    this.mode=mode; this.step=0;
    if(this.ctx&&this.playing) this.master.gain.setTargetAtTime(mode==='battle'?0.28:0.22, this.ctx.currentTime, 0.5);
  },
  stop(){
    this.playing=false; if(this.timer) clearTimeout(this.timer);
    if(this.ctx&&this.master) this.master.gain.setTargetAtTime(0, this.ctx.currentTime, 0.3);
  },
  toggle(){
    if(this.playing){ this.stop(); return false; }
    else { this.start(this.mode); return true; }
  }
};

/* =========================================================
   SFX — Web Audio 효과음 (BGM과 같은 AudioContext 공유)
   ========================================================= */
const SFX = {
  get ctx(){ return BGM.ctx; },
  master:null, lastHit:0, muted:false,
  ensure(){
    if(!BGM.ctx) BGM.init();
    if(BGM.ctx){
      if(BGM.ctx.state==='suspended') BGM.ctx.resume();   // 정지 상태면 재개 (효과음 안 나오는 문제 해결)
      if(!this.master){
        this.master=BGM.ctx.createGain(); this.master.gain.value=0.6; this.master.connect(BGM.ctx.destination);
      }
    }
    return BGM.ctx;
  },
  // 짧은 노이즈 버스트 (검격/타격)
  noise(dur, vol, hp){
    const ctx=this.ensure(); if(!ctx||this.muted) return;
    const n=Math.floor(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(1,n,ctx.sampleRate); const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp||800;
    const g=ctx.createGain(); g.gain.value=vol||0.3;
    src.connect(f); f.connect(g); g.connect(this.master);
    src.start();
  },
  tone(freq, dur, type, vol, slideTo){
    const ctx=this.ensure(); if(!ctx||this.muted) return;
    const t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t+dur);
    o.connect(g); g.connect(this.master);
    g.gain.setValueAtTime(vol||0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  },
  // 기본 타격 (연타 방지 스로틀)
  hit(){
    const now=performance.now(); if(now-this.lastHit<40) return; this.lastHit=now;
    this.noise(0.06, 0.18, 1100);
  },
  // 적 피격 (퍽) — 스로틀
  enemyHit(){ const now=performance.now(); if(now-(this._lastEH||0)<35) return; this._lastEH=now; this.noise(0.045, 0.13, 700); },
  // 크리티컬
  crit(){ this.noise(0.09,0.22,500); this.tone(880,0.12,'square',0.15,220); },
  // 스킬
  skill(){ this.tone(520,0.18,'sawtooth',0.2,180); this.noise(0.12,0.18,700); },
  // 필살기
  ult(){ this.tone(300,0.5,'sawtooth',0.28,90); this.noise(0.4,0.25,400);
    const ctx=this.ensure(); if(ctx&&!this.muted) setTimeout(()=>this.tone(660,0.35,'square',0.2,180),120); },
  // 보스 등장 (둥~)
  bossRoar(){ this.tone(110,0.7,'sawtooth',0.32,70); },
  // 플레이어 피격
  playerHurt(){ const now=performance.now(); if(now-(this._lastHurt||0)<250) return; this._lastHurt=now; this.tone(200,0.2,'square',0.2,90); },
  // 처치 마일스톤
  milestone(){ this.tone(440,0.15,'square',0.2); setTimeout(()=>this.tone(660,0.2,'square',0.2),120); },
  // 스테이지 클리어 팡파레
  fanfare(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.tone(f,0.25,'triangle',0.22),i*130)); },
};

/* =========================================================
   임팩트 연출 시스템 — 히트스톱 / 슬로모션 / 줌펀치
   실시간(게임 정지와 무관)으로 진행되는 연출 타이머
   ========================================================= */
const FX = {
  hitStop:0,        // 남은 히트스톱 시간(실시간 초). >0이면 게임 완전 정지
  slowT:0, slowScale:1,  // 슬로모션 남은 시간 / 배율
  zoomPunchT:0, zoomPunchFrom:1, zoomPunchTo:1, zoomPunchDur:0,  // 줌 펀치
  flashT:0,
  // 히트스톱: 짧고 강한 정지 (타격의 묵직함)
  stop(dur){ this.hitStop=Math.max(this.hitStop,dur); },
  // 슬로모션: dur초 동안 scale배속
  slow(dur,scale){ this.slowT=dur; this.slowScale=scale; },
  // 줌 펀치: 순간 확대 후 복귀 (강렬한 임팩트)
  zoomPunch(to,dur){ this.zoomPunchFrom=zoom; this.zoomPunchTo=to; this.zoomPunchDur=dur; this.zoomPunchT=dur; },
  shake(v){ camShake=Math.max(camShake,v); },
  // 프리셋: 상황별 조합
  impactLight(){ this.stop(0.04); this.shake(1); },
  impactHeavy(){ this.stop(0.09); this.slow(0.18,0.35); this.zoomPunch(1.3,0.25); this.shake(2.2); },
  impactCrit(){ this.stop(0.11); this.slow(0.25,0.28); this.zoomPunch(1.45,0.3); this.shake(2.6); },
  impactUltStart(){ this.stop(0.55); this.zoomPunch(1.85,0.55); this.shake(1); },  // 필살기 발동 정지 강화
  impactUltHit(){ this.stop(0.08); this.slow(0.7,0.4); this.zoomPunch(1.2,0.5); this.shake(3.5); },
  impactBossDefeat(){ this.stop(0.5); this.slow(1.4,0.18); this.zoomPunch(1.7,1.2); this.shake(3.5); },
  impactBossAppear(){ this.stop(0.3); this.zoomPunch(1.5,0.6); this.shake(1.5); },
  impactMilestone(){ this.stop(0.12); this.slow(0.9,0.28); this.zoomPunch(0.82,0.9); this.shake(2.6); },  // 줌아웃
  // 매 프레임 갱신 (rt = 실시간 dt). 반환: 게임 진행 배율(0이면 정지)
  update(rt){
    // 히트스톱 우선
    if(this.hitStop>0){ this.hitStop-=rt; }
    // 줌 펀치 (실시간 보간, 정지 중에도 진행)
    if(this.zoomPunchT>0){
      this.zoomPunchT-=rt;
      const p=1-Math.max(0,this.zoomPunchT)/this.zoomPunchDur; // 0→1
      // 앞 30%는 확대, 뒤 70%는 복귀 (탄성)
      let z;
      if(p<0.3){ z=this.zoomPunchFrom+(this.zoomPunchTo-this.zoomPunchFrom)*(p/0.3); }
      else { const q=(p-0.3)/0.7; z=this.zoomPunchTo+(zoomTarget-this.zoomPunchTo)*q; }
      zoom=z;
    }
    // 슬로모션
    let scale=1;
    if(this.slowT>0){ this.slowT-=rt; scale=this.slowScale; }
    if(this.hitStop>0) return 0;   // 완전 정지
    return scale;
  }
};

/* =========================================================
   입력: 통합 멀티터치 (각 손가락 독립 추적)
   화면 어디든: 버튼 위면 스킬, 아니면 조이스틱(왼쪽 우선)
   ========================================================= */
const joyBase=$('joyBase'), joyStick=$('joyStick');
let joyId=null, joyCx=0, joyCy=0, joyDx=0, joyDy=0;
const JOY_R=65;
// 각 버튼의 화면 영역을 반환
function btnHit(x,y){
  for(const id of ['ultBtn','skill1Btn','skill2Btn']){
    const el=$(id); if(!el) continue;
    const r=el.getBoundingClientRect();
    // 원형 버튼이라 중심 거리로 판정 (여유 8px)
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    if(Math.hypot(x-cx,y-cy) <= r.width/2+8) return id;
  }
  return null;
}
function triggerSkill(id){
  if(!G || G._paused || G.gameOver) return;
  if(id==='ultBtn'){ if(G.ultReady) fireUlt(); }
  else if(id==='skill1Btn'){ if(G.s1cd<=0) useSkill1(); }
  else if(id==='skill2Btn'){ if(G.s2cd<=0) useSkill2(); }
}

const inputSurface = document.getElementById('app');
inputSurface.addEventListener('pointerdown', e=>{
  if(!running||!G||G.gameOver||G._paused) return;
  // UI 스크린(메뉴 등)이 떠 있으면 무시
  if(document.querySelector('.screen.on')) return;
  const bid=btnHit(e.clientX,e.clientY);
  if(bid){ e.preventDefault(); triggerSkill(bid); return; }  // 버튼: 즉시 발동, 조이스틱 안 잡음
  // 조이스틱: 이미 잡은 손가락이 없을 때만
  if(joyId===null){
    joyId=e.pointerId; joyCx=e.clientX; joyCy=e.clientY;
    joyBase.style.display='block'; joyStick.style.display='block';
    joyBase.style.left=(joyCx-JOY_R)+'px'; joyBase.style.top=(joyCy-JOY_R)+'px';
    joyStick.style.left=(joyCx-27)+'px'; joyStick.style.top=(joyCy-27)+'px';
  }
}, {passive:false});
inputSurface.addEventListener('pointermove', e=>{
  if(e.pointerId!==joyId) return;
  let dx=e.clientX-joyCx, dy=e.clientY-joyCy; const dist=Math.hypot(dx,dy);
  if(dist>JOY_R){ dx=dx/dist*JOY_R; dy=dy/dist*JOY_R; }
  joyDx=dx/JOY_R; joyDy=dy/JOY_R;
  joyStick.style.left=(joyCx+dx-27)+'px'; joyStick.style.top=(joyCy+dy-27)+'px';
}, {passive:false});
function joyEnd(e){
  if(e.pointerId!==joyId) return;
  joyId=null; joyDx=0; joyDy=0;
  joyBase.style.display='none'; joyStick.style.display='none';
}
inputSurface.addEventListener('pointerup', joyEnd);
inputSurface.addEventListener('pointercancel', joyEnd);

/* =========================================================
   메인 루프
   ========================================================= */
function loop(now){
  if(!running) return;
  let rt=(now-lastT)/1000; lastT=now;   // 실시간 dt
  if(rt>0.05) rt=0.05;
  // 임팩트 연출 갱신 (실시간) → 게임 진행 배율 반환
  const fxScale = FX.update(rt);
  // 줌 보간 (줌펀치 중이 아닐 때만 zoomTarget으로 부드럽게)
  if(FX.zoomPunchT<=0) zoom += (zoomTarget-zoom)*Math.min(1,rt*8);
  if(camShake>0) camShake=Math.max(0,camShake-rt*3);
  const dt = rt * timeScale * fxScale;   // 실제 게임 진행량
  if(!G.gameOver && !G._paused && dt>0) update(dt);
  render();
  rafId=requestAnimationFrame(loop);
}

function update(dt){
  const g=G, h=g.hero; g.time+=dt; g.animTick+=dt;

  // 콤보 타이머 (시간 내 미처치 시 소멸)
  if(g.comboT>0){ g.comboT-=dt; if(g.comboT<=0){ g.combo=0; hideCombo(); } }

  // 버프 타이머
  if(g.buffInvul>0) g.buffInvul-=dt;
  if(g.buffAtk>0) g.buffAtk-=dt;
  if(g.buffSpd>0) g.buffSpd-=dt;
  if(g.s1cd>0) g.s1cd-=dt;
  if(g.s2cd>0) g.s2cd-=dt;
  if(g.swingT>0) g.swingT-=dt;

  // 이동
  let spd=h.spd*60*g.spdMul*(g.buffSpd>0?1.8:1);
  g.px+=joyDx*spd*dt; g.py+=joyDy*spd*dt;
  if(joyDx!==0) g.facing=joyDx>0?1:-1;
  g.px=Math.max(30,Math.min(g.worldW-30,g.px)); g.py=Math.max(30,Math.min(g.worldH-30,g.py));

  if(g.regen>0) g.hp=Math.min(g.maxHp,g.hp+g.regen*dt);

  // 시나리오: 킬 목표 달성 시 보스 등장
  const sc=SCENARIO[g.chapter];
  if(!g.bossSpawned && g.chapterKills>=sc.killGoal){
    spawnBoss(sc.boss);
  }

  // 적 스폰 — 보스 등장 전까지 잡병 러시 (보스전 중엔 소수만)
  g.spawnTimer-=dt;
  const spawnInterval=Math.max(0.04, 0.40 - g.chapter*0.03);
  const spawnCap = g.bossActive ? 90 : 200;
  if(g.spawnTimer<=0 && g.enemies.length<spawnCap && !g.bossSpawned || (g.bossActive && g.enemies.length<60)){
    if(g.spawnTimer<=0){
      g.spawnTimer=spawnInterval;
      const batch=4+g.chapter*2;
      for(let i=0;i<batch;i++) spawnEnemy();
    }
  }

  // === 웨이브 이벤트 (긴장감) — 보스전 아닐 때 주기적으로 발생 ===
  g.eventTimer=(g.eventTimer||0)-dt;
  if(g.eventTimer<=0 && !g.bossSpawned && g.chapterKills>15){
    g.eventTimer = 14 + Math.random()*8;   // 14~22초마다
    const roll=Math.random();
    if(roll<0.4){
      // 기병 돌격 웨이브: 한쪽에서 기병 대열이 몰려옴
      const dir=Math.random()*Math.PI*2;
      bigToast('⚠ 적 기병 돌격!');
      SFX.bossRoar();
      FX.shake(1.5);
      for(let i=0;i<12+g.chapter*2;i++){ const spread=(Math.random()-0.5)*0.6;
        spawnEnemy({kind:'cav', ang:dir+spread}); }
    } else if(roll<0.7){
      // 엘리트 출현
      bigToast('⚠ 정예 무장 출현!');
      SFX.crit();
      const n=1+Math.floor(g.chapter/3);
      for(let i=0;i<n;i++) spawnEnemy({elite:true});
    } else {
      // 아군 원군 (동료 소환) — 같은 진영 무장
      const roster=HEROES.filter(hh=>hh.f===g.hero.f && hh.n!==g.hero.n);
      if(roster.length){ const ally=roster[Math.floor(Math.random()*roster.length)];
        summonAlly(ally.n); }
      else { spawnEnemy({elite:true}); }
    }
  }

  // 기본공격 자동
  g.wpnTimer-=dt;
  const rate=h.wpn.rate/60*g.rateMul;
  if(g.wpnTimer<=0){ g.wpnTimer=rate; fireWeapon(); }

  // 동료(원군) 업데이트 — 근처 적을 자동 공격, 수명 다하면 퇴장
  if(g.allies && g.allies.length){
    for(const a of g.allies){
      if(a.dead) continue;
      a.life-=dt; a.animP+=dt*8;
      if(a.life<=0){ a.dead=true; continue; }
      // 가장 가까운 적 탐색
      let tgt=null, best=1e9;
      for(const e of g.enemies){ if(e.dead) continue; const dd=Math.hypot(e.x-a.x,e.y-a.y); if(dd<best){best=dd;tgt=e;} }
      if(tgt){
        // 적에게 접근
        if(best>60){ const ax=(tgt.x-a.x)/best, ay=(tgt.y-a.y)/best; a.x+=ax*130*dt; a.y+=ay*130*dt; }
        // 플레이어와 너무 멀어지지 않게
        const pd=Math.hypot(g.px-a.x,g.py-a.y); if(pd>320){ a.x+=(g.px-a.x)/pd*100*dt; a.y+=(g.py-a.y)/pd*100*dt; }
        // 공격
        a.atkCd-=dt;
        if(a.atkCd<=0 && best<90){ a.atkCd=0.5;
          g.slashes.push({type:'cone',cx:a.x,cy:a.y,range:100,dmg:40+g.chapter*10,dir:Math.atan2(tgt.y-a.y,tgt.x-a.x),half:Math.PI*0.45,age:0,dur:0.14,hitSet:new Set(),fx:{type:'cone',range:100,dir:Math.atan2(tgt.y-a.y,tgt.x-a.x)}});
          for(const e of g.enemies){ if(e.dead)continue; const dd=Math.hypot(e.x-a.x,e.y-a.y); if(dd<100) hitEnemy(e,40+g.chapter*10,false); }
        }
      } else {
        // 적 없으면 플레이어 곁으로
        const pd=Math.hypot(g.px-a.x,g.py-a.y)||1; if(pd>70){ a.x+=(g.px-a.x)/pd*100*dt; a.y+=(g.py-a.y)/pd*100*dt; }
      }
      if(a.hitFlash>0) a.hitFlash-=dt;
    }
    g.allies=g.allies.filter(a=>!a.dead);
  }

  // 적 이동/공격
  for(const e of g.enemies){
    if(e.dead) continue;
    if(e.elite){ e.eliteGlow=(e.eliteGlow||0)+dt; }
    const dx=g.px-e.x, dy=g.py-e.y; const d=Math.hypot(dx,dy)||1;
    if(e.kind==='boss'){
      updateBoss(e, dx, dy, d, dt);
    } else if(e.kind==='archer'){
      // 화면에 보이는 사거리 (줌 고려). 이보다 멀면 못 쏘고 접근한다
      const shootRange=Math.min(W,H)/zoom*0.42;
      const ideal=shootRange*0.7;
      if(d<ideal-30){ e.x-=dx/d*e.spd*dt; e.y-=dy/d*e.spd*dt; }
      else if(d>ideal+30){ e.x+=dx/d*e.spd*1.4*dt; e.y+=dy/d*e.spd*1.4*dt; }
      e.shootCd-=dt;
      if(e.shootCd<=0 && d<shootRange){ e.shootCd=2.0+Math.random()*1.2; enemyShoot(e,dx/d,dy/d); }
    } else {
      e.x+=dx/d*e.spd*dt; e.y+=dy/d*e.spd*dt;
    }
    // 접촉 대미지 (보스는 별도 처리)
    if(d<e.r+18 && e.kind!=='archer' && e.kind!=='boss'){
      if(g.buffInvul<=0){ g.hp-=e.dmg*dt; SFX.playerHurt(); if(g.hp<=0){ g.hp=0; loseGame(); return; } }
    }
  }

  // 아군 투사체
  for(const p of g.projectiles){
    if(p.dead) continue;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    // 수명 다하거나 월드 밖으로 크게 벗어나면 제거 (화면이 아니라 월드 기준!)
    if(p.life<=0 || p.x<-100 || p.x>g.worldW+100 || p.y<-100 || p.y>g.worldH+100){ p.dead=true; continue; }
    for(const e of g.enemies){
      if(e.dead||p.hitSet.has(e.id)) continue;
      if(Math.hypot(p.x-e.x,p.y-e.y)<e.r+p.r){
        hitEnemy(e,p.dmg,p.crit); p.hitSet.add(e.id);
        if(p.pierce<=0){ p.dead=true; break; } else p.pierce--;
      }
    }
  }
  // 적 투사체 (궁병)
  for(const p of g.eProjectiles){
    if(p.dead) continue;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if(p.life<=0){ p.dead=true; continue; }
    if(Math.hypot(p.x-g.px,p.y-g.py)<16){
      p.dead=true;
      if(g.buffInvul<=0){ g.hp-=p.dmg; SFX.playerHurt(); if(g.hp<=0){ g.hp=0; loseGame(); return; } }
    }
  }

  // 근접 판정
  for(const s of g.slashes){
    if(s.done) continue;
    s.age+=dt; if(s.age>=s.dur){ s.done=true; continue; }
    for(const e of g.enemies){
      if(e.dead||s.hitSet.has(e.id)) continue;
      const dx=e.x-s.cx, dy=e.y-s.cy; const dist=Math.hypot(dx,dy);
      if(dist>s.range+e.r) continue;
      if(s.type==='spin'){ hitEnemy(e,s.dmg,s.crit); s.hitSet.add(e.id); if(s.knock) knockback(e,dx,dy,s.knock); }
      else if(s.type==='cone'){
        const ang=Math.atan2(dy,dx); let diff=Math.abs(normAng(ang-s.dir));
        if(diff<s.half){ hitEnemy(e,s.dmg,s.crit); s.hitSet.add(e.id); if(s.knock) knockback(e,dx,dy,s.knock); if(s.stun) e.stun=s.stun; }
      }
    }
  }
  g.slashes=g.slashes.filter(s=>!s.done);

  // 구슬 수집
  for(const o of g.orbs){
    if(o.dead) continue;
    const dx=g.px-o.x, dy=g.py-o.y; const d=Math.hypot(dx,dy);
    if(d<g.pickupR){ o.x+=dx/d*280*dt; o.y+=dy/d*280*dt; }
    if(d<20){ o.dead=true; gainXP(o.v); }
  }

  for(const pt of g.particles){ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=dt; pt.vx*=0.92; pt.vy*=0.92; }
  for(const d of g.damageTexts){ d.y-=40*dt; d.life-=dt; }

  // 청소
  g.enemies.forEach(e=>{ if(e.dead) e.deathAge=(e.deathAge||0)+dt; if(e.stun>0)e.stun-=dt; });
  g.enemies=g.enemies.filter(e=>!(e.dead&&e.deathAge>=0.3));
  g.projectiles=g.projectiles.filter(p=>!p.dead);
  g.eProjectiles=g.eProjectiles.filter(p=>!p.dead);
  g.orbs=g.orbs.filter(o=>!o.dead);
  g.particles=g.particles.filter(p=>p.life>0);
  g.damageTexts=g.damageTexts.filter(d=>d.life>0);

  updateHUD();
}
function normAng(a){ while(a>Math.PI)a-=2*Math.PI; while(a<-Math.PI)a+=2*Math.PI; return a; }
function knockback(e,dx,dy,f){ const d=Math.hypot(dx,dy)||1; e.x+=dx/d*f; e.y+=dy/d*f; }

/* =========================================================
   적 스폰 (병종: 보병/기병/궁병)
   ========================================================= */
let enemyIdSeq=0;
function spawnEnemy(opts){
  const g=G;
  opts=opts||{};
  const viewR=Math.max(W,H)/zoom*0.62;
  const ang=(opts.ang!==undefined)?opts.ang:Math.random()*Math.PI*2, rad=viewR+40+Math.random()*80;
  let x=(opts.x!==undefined)?opts.x:g.px+Math.cos(ang)*rad, y=(opts.y!==undefined)?opts.y:g.py+Math.sin(ang)*rad;
  x=Math.max(20,Math.min(g.worldW-20,x)); y=Math.max(20,Math.min(g.worldH-20,y));
  const tScale=1+g.chapter*0.35;
  let kind=opts.kind||'foot';
  if(!opts.kind){ const roll=Math.random(); if(roll<0.22) kind='cav'; else if(roll<0.40) kind='archer'; }
  const facKeys=Object.keys(FAC_COLOR);
  const fac=opts.fac||facKeys[Math.floor(Math.random()*facKeys.length)];
  let hp,r,spd,dmg,xpv;
  if(kind==='cav'){ hp=16*tScale; r=13; spd=88+Math.random()*24; dmg=16; xpv=2; }
  else if(kind==='archer'){ hp=12*tScale; r=12; spd=48+Math.random()*14; dmg=10; xpv=2; }
  else { hp=14*tScale; r=12; spd=52+Math.random()*16; dmg=14; xpv=1; }
  const e={ id:enemyIdSeq++, x,y, hp, maxHp:hp, r, spd, dmg, dead:false, deathAge:0,
    col:FAC_COLOR[fac], kind, hitFlash:0, xpv, shootCd:1.5+Math.random(), stun:0, lord:false, animP:Math.random()*6 };
  // 엘리트: 빛나는 강화 몹 (큰 체력·데미지, XP 다량)
  if(opts.elite){
    e.elite=true; e.hp*=6; e.maxHp=e.hp; e.dmg=Math.round(e.dmg*1.6); e.r=Math.round(e.r*1.5);
    e.spd*=0.85; e.xpv=8; e.col='#ffce54'; e.eliteGlow=0;
  }
  g.enemies.push(e);
  return e;
}
// 아군 무장 소환 (동료) — 플레이어 곁에서 함께 싸움
function summonAlly(name){
  const g=G;
  const ally={ id:enemyIdSeq++, ally:true, name, x:g.px+(Math.random()-0.5)*80, y:g.py+(Math.random()-0.5)*80,
    hp:200, maxHp:200, r:15, atkCd:0, life:18, col:FAC_COLOR[g.hero.f], hitFlash:0, animP:0, slug:HERO_SLUG[name]||null };
  g.allies=g.allies||[]; g.allies.push(ally);
  bigToast('원군 등장! '+name);
  SFX.milestone();
}
function spawnBoss(boss){
  const g=G; g.bossSpawned=true; g._paused=true;
  showBossIntro(boss, ()=>{
    if(!G) return;
    const ang=Math.random()*Math.PI*2, rad=Math.max(W,H)/zoom*0.55;
    // 필살기 여러 방 견디는 체력: 기본 4500 × 장별 배율
    const baseHp=4500 + g.chapter*1500;
    const hp=Math.round(baseHp * boss.hpMul);
    g.enemies.push({ id:enemyIdSeq++, x:g.px+Math.cos(ang)*rad, y:g.py+Math.sin(ang)*rad,
      hp, maxHp:hp, r:34, spd:55+g.chapter*6, dmg:Math.round(30*boss.dmgMul), dead:false, deathAge:0,
      col:FAC_COLOR[boss.f], kind:'boss', hitFlash:0, xpv:60, shootCd:99, stun:0,
      lord:true, lordName:boss.n, isFinal:boss.final, animP:0,
      bossType:BOSS_TYPE[boss.n]||'balanced',
      chargeCd:3, atkCd:2 });
    g.bossActive=true;
    g._paused=false;
    lastT=performance.now();
  });
}

function enemyShoot(e,nx,ny){
  const g=G;
  g.eProjectiles.push({ x:e.x, y:e.y, vx:nx*230, vy:ny*230, dmg:e.dmg, life:3.0, dead:false });
}

/* 보스 AI — 추격 + 특기(돌진/범위강타/화살난사) */
function updateBoss(e, dx, dy, d, dt){
  const g=G;
  e.state = e.state || 'chase';
  e.stateT = (e.stateT||0) + dt;
  e.atkCd = (e.atkCd!==undefined? e.atkCd : 3) - dt;

  if(e.state==='chase'){
    // 플레이어 추격
    e.x += dx/d*e.spd*dt; e.y += dy/d*e.spd*dt;
    // 접촉 대미지
    if(d<e.r+18 && g.buffInvul<=0){ g.hp-=e.dmg*dt*0.6; if(g.hp<=0){g.hp=0;loseGame();return;} }
    // 특기 발동 (보스 유형별 성향 + 고유 시그니처)
    if(e.atkCd<=0){
      const bt=e.bossType||'balanced';
      const r=Math.random();
      const pick=(type)=>{ e.state=type; e.stateT=0;
        if(type==='telegraph'){ e.chargeDir=Math.atan2(dy,dx); bossToast(e,'돌격!'); }
        else if(type==='slamWind') bossToast(e,'분쇄!');
        else if(type==='volley'){ e.volleyN=0; bossToast(e,'난사!'); }
        else if(type==='blink'){ bossToast(e,'환영!'); }
        else if(type==='rampage'){ e.rampageN=0; bossToast(e,'맹공!'); }       // rusher 시그니처
        else if(type==='ringfire'){ e.ringN=0; bossToast(e,'천공난사!'); }      // archer 시그니처
        else if(type==='crossfire'){ e.crossN=0; bossToast(e,'만천화우!'); }    // master 시그니처
      };
      if(bt==='rusher'){
        // 연속 돌진(맹공) + 강타. 난사 안 함
        if(d>150 && r<0.45) pick('telegraph');
        else if(r<0.75) pick('rampage');   // 시그니처: 3연속 돌진
        else pick('slamWind');
        e.atkCd=2.0;
      } else if(bt==='archer'){
        // 원형 탄막(천공난사) + 저격. 근접 시 강타로 쫓아냄
        if(r<0.55) pick('ringfire');   // 시그니처: 사방 화살 링
        else if(r<0.8) pick('volley');
        else if(d<180) pick('slamWind');
        else pick('telegraph');
        e.atkCd=2.4;
      } else if(bt==='master'){
        // 십자 탄막(만천화우) + 텔레포트 + 전부. 최다 빈도
        if(r<0.3) pick('crossfire');   // 시그니처: 회전 십자 탄막
        else if(r<0.5) pick('blink');
        else if(r<0.68) pick('telegraph');
        else if(r<0.84) pick('slamWind');
        else pick('volley');
        e.atkCd=1.6;
      } else {
        if(d>160 && r<0.45) pick('telegraph');
        else if(r<0.78) pick('slamWind');
        else pick('volley');
        e.atkCd=2.8;
      }
    }
  }
  else if(e.state==='rampage'){
    // rusher 시그니처: 짧은 간격으로 3연속 돌진 (예고 짧음)
    e.rampageT=(e.rampageT||0)+dt;
    if(e.rampageT<0.35){ /* 짧은 조준 */ e.telegraphDir=Math.atan2(dy,dx); e.chargeDir=e.telegraphDir; }
    else {
      e.rampageT=0; e.rampageN=(e.rampageN||0)+1;
      // 돌진 실행 (즉발)
      const cs=e.spd*8, cd=e.chargeDir;
      e.dashVx=Math.cos(cd)*cs; e.dashVy=Math.sin(cd)*cs; e.dashT=0.35;
      e.state='rampageDash';
    }
  }
  else if(e.state==='rampageDash'){
    e.dashT-=dt;
    e.x+=e.dashVx*dt; e.y+=e.dashVy*dt;
    e.x=Math.max(30,Math.min(g.worldW-30,e.x)); e.y=Math.max(30,Math.min(g.worldH-30,e.y));
    if(d<e.r+24 && g.buffInvul<=0){ g.hp-=e.dmg; SFX.playerHurt(); camShake=2.5; if(g.hp<=0){g.hp=0;loseGame();return;} }
    for(let i=0;i<3;i++) g.particles.push({x:e.x,y:e.y,vx:(Math.random()-.5)*100,vy:(Math.random()-.5)*100,life:0.3,col:'#ff8a4a',r:4});
    if(e.dashT<=0){
      if((e.rampageN||0)<3){ e.state='rampage'; e.rampageT=0; }  // 다음 돌진
      else { e.state='chase'; e.atkCd=2.4; }
    }
  }
  else if(e.state==='ringfire'){
    // archer 시그니처: 사방으로 회전하는 화살 링 (3파)
    e.ringT=(e.ringT||0)+dt;
    if(e.ringT>0.35){
      e.ringT=0; e.ringN=(e.ringN||0)+1;
      const n=12, off=e.ringN*0.26;   // 파마다 회전
      for(let i=0;i<n;i++){ const a=(i/n)*Math.PI*2+off;
        g.eProjectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*230,vy:Math.sin(a)*230,dmg:e.dmg*0.45,life:3.2,dead:false}); }
      camShake=1;
      if((e.ringN||0)>=3){ e.state='chase'; e.atkCd=2.8; }
    }
  }
  else if(e.state==='crossfire'){
    // master 시그니처: 회전하는 십자(4방) 탄막을 뿌리며 전진 (만천화우)
    e.crossT=(e.crossT||0)+dt;
    e.crossAng=(e.crossAng||0)+dt*2.2;   // 회전
    // 천천히 플레이어 추격
    e.x += dx/d*e.spd*0.4*dt; e.y += dy/d*e.spd*0.4*dt;
    if(e.crossT>0.12){
      e.crossT=0; e.crossN=(e.crossN||0)+1;
      for(let k=0;k<4;k++){ const a=e.crossAng+k*(Math.PI/2);
        g.eProjectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*260,vy:Math.sin(a)*260,dmg:e.dmg*0.4,life:3.0,dead:false}); }
      if((e.crossN||0)>=18){ e.state='chase'; e.atkCd=2.2; }
    }
  }
  else if(e.state==='blink'){
    // 텔레포트 (master 전용): 플레이어 반대편으로 순간이동 후 난사
    if(e.stateT<0.25){ /* 사라지는 연출 대기 */ }
    else {
      const ang=Math.atan2(dy,dx)+Math.PI+(Math.random()-0.5)*0.8;
      const dist=180+Math.random()*100;
      e.x=g.px-Math.cos(ang)*dist; e.y=g.py-Math.sin(ang)*dist;
      e.x=Math.max(30,Math.min(g.worldW-30,e.x)); e.y=Math.max(30,Math.min(g.worldH-30,e.y));
      // 도착 후 즉시 난사
      const base=Math.atan2(g.py-e.y,g.px-e.x);
      for(let i=-2;i<=2;i++){ const a=base+i*0.22;
        g.eProjectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*300,vy:Math.sin(a)*300,dmg:e.dmg*0.5,life:3.0,dead:false}); }
      for(let i=0;i<30;i++){ const a=Math.random()*Math.PI*2,sp=100+Math.random()*200;
        g.particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4,col:'#c9a0ff',r:4}); }
      camShake=1.5; e.state='chase'; e.atkCd=2.2;
    }
  }
  else if(e.state==='telegraph'){
    // 돌진 예고 (0.7초 멈춤, 붉은 조준선)
    e.telegraphDir=e.chargeDir;
    if(e.stateT>0.7){ e.state='charge'; e.stateT=0; }
  }
  else if(e.state==='charge'){
    // 빠르게 돌진 (0.5초)
    const cs=e.spd*7;
    e.x += Math.cos(e.chargeDir)*cs*dt; e.y += Math.sin(e.chargeDir)*cs*dt;
    // 돌진 중 접촉 = 큰 대미지 + 넉백
    if(d<e.r+22 && g.buffInvul<=0){ g.hp-=e.dmg*0.8; camShake=2;
      if(g.hp<=0){g.hp=0;loseGame();return;} e.state='chase'; e.atkCd=2.5; }
    // 월드 경계
    e.x=Math.max(30,Math.min(g.worldW-30,e.x)); e.y=Math.max(30,Math.min(g.worldH-30,e.y));
    if(e.stateT>0.5){ e.state='chase'; e.atkCd=2.6; }
  }
  else if(e.state==='slamWind'){
    // 강타 예고 (0.6초, 원형 경고)
    e.slamR = 150 + e.stateT*100;
    if(e.stateT>0.6){
      // 강타 발동: 주변 원형 충격파
      const rng=e.slamR;
      if(d<rng && g.buffInvul<=0){ g.hp-=e.dmg*1.2; if(g.hp<=0){g.hp=0;loseGame();return;} }
      // 시각 충격파
      g.slashes.push({type:'spin',cx:e.x,cy:e.y,range:rng,dmg:0,dir:0,half:Math.PI,age:0,dur:0.4,hitSet:new Set(),fx:{type:'spin',range:rng,big:true,enemy:true}});
      for(let i=0;i<40;i++){ const a=Math.random()*Math.PI*2,sp=200+Math.random()*300;
        g.particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.5,col:'#ff5a3a',r:4}); }
      camShake=3;
      e.state='chase'; e.atkCd=3;
    }
  }
  else if(e.state==='volley'){
    // 부채꼴 화살 3연발 × 3회
    e.volleyT=(e.volleyT||0)+dt;
    if(e.volleyT>0.25){
      e.volleyT=0; e.volleyN++;
      const base=Math.atan2(dy,dx);
      for(let i=-1;i<=1;i++){ const a=base+i*0.25;
        g.eProjectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*280,vy:Math.sin(a)*280,dmg:e.dmg*0.5,life:3.0,dead:false}); }
      if(e.volleyN>=3){ e.state='chase'; e.atkCd=3; }
    }
  }
}

function aimDir(){

  if(near) return Math.atan2(near.y-G.py, near.x-G.px);
  return G.facing>0?0:Math.PI;
}
function fireWeapon(){
  const g=G, w=g.hero.wpn, hn=g.hero.n, ev=g.evo||{};

  let range=w.range*g.rangeMul;

  if(w.type==='spin'){
    // 여포는 초광역 회전, 그 외 표준
    let rMul = (hn==='여포')?1.3:(hn==='허저'?1.15:1.0);
    // 진화: 여포 천하무쌍(범위+크리), 허저 광호격노(범위+넉백), 관우 적룡언월(화염참격)
    let knock=0, crit=false, col=null;
    if(hn==='여포' && ev.lubu){ rMul=1.7; crit=true; }

    g.slashes.push(sl);
    // 관우 진화: 전방 화염 참격 추가 발사
    if(hn==='관우' && ev.guanyu){ const dir=aimDir();
      shootProj(dir,600,dmg*1.2,range*2.2,4+g.pierce,'#ff7a3a',7); }
    triggerSwing('spin', 0);
  } else if(w.type==='cone'){
    const dir=aimDir();
    let hits = ((hn==='태사자'||hn==='손책'))?2:1;
    // 진화: 태사자 4연격, 손책 파동, 하후돈 관통, 장료 돌진
    if(hn==='태사자' && ev.taishici) hits=4;
    if(hn==='손책' && ev.sunce) hits=3;
    if(hits>1){
      const per=dmg*(hits===2?0.6:0.45);
      for(let k=0;k<hits;k++) setTimeout(()=>{ if(G){ const d2=aimDir(); G.slashes.push({type:'cone', cx:G.px,cy:G.py, range, dmg:per, dir:d2, half:Math.PI*0.42, age:0, dur:0.13, hitSet:new Set(), fx:{type:'cone',range,dir:d2}}); } }, k*75);
      if(hn==='손책' && ev.sunce){ shootProj(dir,640,dmg*0.8,range*1.8,3,'#ff9a4a',6); } // 파동
    } else if(hn==='장비'){
      g.slashes.push({type:'cone', cx:g.px,cy:g.py, range, dmg, dir, half:Math.PI*0.55, age:0, dur:0.2, hitSet:new Set(), knock:12, fx:{type:'cone',range,dir}});
      // 장비 진화: 광역 충격파
      if(ev.zhangfei){ g.slashes.push({type:'spin',cx:g.px,cy:g.py,range:range*1.4,dmg:dmg*0.7,dir:0,half:Math.PI,age:0,dur:0.2,hitSet:new Set(),knock:20,fx:{type:'spin',range:range*1.4}}); }
    } else {
      const half = (hn==='허저')?Math.PI*0.5:Math.PI*0.42;
      g.slashes.push({type:'cone', cx:g.px,cy:g.py, range, dmg, dir, half, age:0, dur:0.18, hitSet:new Set(), fx:{type:'cone',range,dir}});
      // 하후돈 진화: 관통 참격 / 장료 진화: 돌진 관통
      if(hn==='하후돈' && ev.xiahoudun){ shootProj(dir,560,dmg*0.9,range*2.4,6,'#7ab0ff',6); }
      if(hn==='장료' && ev.zhangliao){ shootProj(dir,640,dmg*1.1,range*2.6,8,'#7ab0ff',6); }
    }
    triggerSwing('slash', dir);
  } else if(w.type==='pierce'){
    const dir=aimDir();
    shootProj(dir,520,dmg,range,8+g.pierce,'#e8e0c0',5);
    // 조운 진화: 2갈래 분열
    if(hn==='조운' && ev.zhaoyun){
      shootProj(dir+0.12,520,dmg*0.8,range,8+g.pierce,'#8ad0ff',5);
      shootProj(dir-0.12,520,dmg*0.8,range,8+g.pierce,'#8ad0ff',5);
    }
    triggerSwing('thrust', dir);
  } else if(w.type==='shoot'){
    const dir=aimDir();
    if(hn==='감녕'){
      let n = ev.ganning?4:2;   // 진화: 4발
      const pierce = ev.ganning?(4+g.pierce):(1+g.pierce);
      for(let i=0;i<n;i++){ const off=(i-(n-1)/2)*0.14; shootProj(dir+off,700,dmg,range,pierce,'#ffb84a',5); }
    } else {
      let arrows = (hn==='황충'&&ev.huangzhong)?5:3;   // 황충 진화: 5발
      const pierce = (hn==='황충'&&ev.huangzhong)?(4+g.pierce):(1+g.pierce);
      const spread=0.26;
      for(let i=0;i<arrows;i++){ const off=(i-(arrows-1)/2)*spread; shootProj(dir+off,620,dmg,range,pierce,'#ffe680',4); }
    }
    triggerSwing('bow', dir);
  }
}

function shootProj(dir,speed,dmg,range,pierce,col,r){

function nearestEnemy(){
  const g=G; let best=null,bd=1e9;
  for(const e of g.enemies){ if(e.dead)continue; const d=Math.hypot(e.x-g.px,e.y-g.py); if(d<bd){bd=d;best=e;} }
  return best;
}

/* =========================================================
   피격/처치 + 크리티컬 이펙트
   ========================================================= */
function hitEnemy(e,dmg,forceCrit){
  const g=G; let d=dmg; let isCrit=false;
  if(forceCrit || (g.crit>0 && Math.random()<g.crit)){ d*=2; isCrit=true; }
  d=Math.round(d); e.hp-=d; e.hitFlash=0.12; SFX.enemyHit();
  g.damageTexts.push({x:e.x,y:e.y-e.r,v:d,life:0.5,crit:isCrit});
  if(isCrit && !e.dead) critEffect(e);
  if(e.hp<=0 && !e.dead){
    e.dead=true; e.deathAge=0; g.kills++;
    // 콤보 카운터
    g.combo=(g.combo||0)+1; g.comboT=2.2;   // 2.2초 내 다음 처치 시 유지
    if(g.combo>=5) showCombo(g.combo);
    if(g.combo>(g.maxCombo||0)) g.maxCombo=g.combo;
    if(!e.lord) g.chapterKills++;   // 잡병만 진행도에 카운트
    g.orbs.push({x:e.x,y:e.y,v:e.xpv,dead:false});
    const pc=e.lord?40:(e.kind==='cav'?7:6);
    for(let i=0;i<pc;i++){ const a=Math.random()*Math.PI*2, sp=40+Math.random()*140;
      g.particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4+Math.random()*0.4,col:e.col,r:e.lord?6:3}); }
    g.ultCharge=Math.min(g.ultMax, g.ultCharge+(e.lord?40:(e.kind==='cav'?2.4:1.6))*g.ultRate);
    if(g.ultCharge>=g.ultMax && !g.ultReady){ g.ultReady=true; toast('🐉 필살기 준비! (우하단 버튼)'); vib([20,40,20]); }
    if(g.vamp>0 && Math.random()<g.vamp) g.hp=Math.min(g.maxHp,g.hp+5);
    if(e.lord){ bossDefeated(e); }
    // 100명 단위 마일스톤
    if(Math.floor(g.kills/100) > g.lastMilestone){
      g.lastMilestone=Math.floor(g.kills/100);
      killMilestone(g.lastMilestone*100);
    }
  }
}

   XP & 레벨업

function gainXP(v){
  const g=G; g.xp+=v;
  while(g.xp>=g.xpNext){ g.xp-=g.xpNext; g.level++; g.xpNext=Math.round(4+g.level*3.2+g.level*g.level*0.35); openLevelUp(); }
}
function rollUpRarity(){ const total=Object.values(RAR_W).reduce((a,b)=>a+b,0); let r=Math.random()*total;
  for(const [k,w] of Object.entries(RAR_W)){ r-=w; if(r<=0) return k; } return 'c'; }
function openLevelUp(){
  const g=G; g._paused=true;
  const row=$('upgradeRow'); row.innerHTML='';
  // 진화 가능하면 특별 진화 선택지 (황금 카드) 우선 제시
  const evo=availableEvolution(g);
  if(evo){
    const c=document.createElement('div'); c.className='up-card evo-card';
    c.innerHTML=`<div class="up-lv" style="color:#ffd050">✦ 무기 진화 ✦</div>
      <div class="up-ic">${evo.ic}</div><div class="up-t" style="color:#ffe680">${evo.name}</div><div class="up-d">${evo.d}</div>`;
    c.onclick=()=>takeEvolution(evo); row.appendChild(c);
  }
  const avail=UPGRADES.filter(u=>(g.upLevels[u.id]||0)<u.max);
  const picks=[]; const pool=[...avail];
  const nUp = evo?2:3;   // 진화 나오면 일반 2개, 아니면 3개
  for(let i=0;i<nUp && pool.length>0;i++){
    let rar=rollUpRarity(); let cand=pool.filter(u=>u.rar===rar); if(cand.length===0) cand=pool;
    const u=cand[Math.floor(Math.random()*cand.length)]; picks.push(u); pool.splice(pool.indexOf(u),1);
  }
  if(picks.length===0 && !evo){ g.hp=Math.min(g.maxHp,g.hp+40); g._paused=false; return; }
  picks.forEach(u=>{
    const lv=(g.upLevels[u.id]||0);
    const c=document.createElement('div'); c.className='up-card rar-'+u.rar;
    c.innerHTML=`<div class="up-lv">${lv>0?('Lv.'+lv+'→'+(lv+1)):'NEW'}</div>
      <div class="up-ic">${u.ic}</div><div class="up-t">${u.t}</div><div class="up-d">${u.d}</div>`;
    c.onclick=()=>takeUpgrade(u); row.appendChild(c);
  });
  $('lvlHead').textContent=evo?'무기 진화 가능!':'LEVEL '+g.level; show('levelupScreen'); lastT=performance.now();
}

  band.style.animation='none'; void band.offsetWidth; band.style.animation='biBand .5s ease-out forwards';
  intro.classList.add('on');
  SFX.bossRoar();
  FX.impactBossAppear();
  vib([30,30,30]);
  setTimeout(()=>{ intro.classList.remove('on'); cb&&cb(); }, 2200);
}

/* =========================================================
   렌더링 (줌/카메라 적용)
   ========================================================= */
function render(){
  const g=G; if(!g) return;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1208'; ctx.fillRect(0,0,W,H);

  ctx.save();
  // 카메라: 플레이어 중심 줌 + 흔들림
  const shx=(Math.random()-0.5)*camShake*10, shy=(Math.random()-0.5)*camShake*10;
  // 카메라 중심 = 플레이어, 단 월드 가장자리에선 검은 영역 안 보이게 클램프
  const halfW=W/(2*zoom), halfH=H/(2*zoom);
  let camX=g.px, camY=g.py;
  if(g.worldW>halfW*2) camX=Math.max(halfW, Math.min(g.worldW-halfW, camX)); else camX=g.worldW/2;
  if(g.worldH>halfH*2) camY=Math.max(halfH, Math.min(g.worldH-halfH, camY)); else camY=g.worldH/2;
  ctx.translate(W/2+shx, H/2+shy); ctx.scale(zoom,zoom); ctx.translate(-camX,-camY);

  drawGround();

  // 구슬
  for(const o of g.orbs){
    ctx.beginPath(); ctx.arc(o.x,o.y,4,0,Math.PI*2);
    ctx.fillStyle=o.v>=5?'#c07ae8':'#4a9fe8'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1; ctx.stroke();
  }
  // 근접 이펙트
  for(const s of g.slashes){
    if(!s.fx) continue; const prog=s.age/s.dur;
    ctx.save(); ctx.translate(s.cx,s.cy);
    if(s.fx.type==='spin'){
      ctx.rotate(prog*Math.PI*2);
      ctx.strokeStyle=`rgba(232,220,180,${0.85*(1-prog)})`; ctx.lineWidth=s.fx.big?9:6;
      ctx.beginPath(); ctx.arc(0,0,s.range*0.82,0,Math.PI*1.5); ctx.stroke();
      ctx.strokeStyle=`rgba(255,255,255,${0.6*(1-prog)})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,s.range*0.82,0,Math.PI*1.5); ctx.stroke();
    } else if(s.fx.type==='cone'){
      ctx.rotate(s.fx.dir);
      const alpha=0.75*(1-prog);
      const grad=ctx.createLinearGradient(0,0,s.range,0);
      grad.addColorStop(0,`rgba(232,220,180,${alpha})`); grad.addColorStop(1,'rgba(232,220,180,0)');
      ctx.fillStyle=grad; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,s.range,-s.half,s.half); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
  // 아군 투사체
  for(const p of g.projectiles){
    const sp=Math.hypot(p.vx,p.vy)||1; const ang=Math.atan2(p.vy,p.vx);
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(ang);
    // 꼬리 트레일
    ctx.strokeStyle=p.col; ctx.globalAlpha=0.5; ctx.lineWidth=p.r*1.2;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-p.r*4,0); ctx.stroke();
    ctx.globalAlpha=1;
    // 화살촉 (앞이 뾰족한 마름모)
    ctx.fillStyle=p.col; ctx.beginPath();
    ctx.moveTo(p.r*2.2,0); ctx.lineTo(-p.r*0.6,p.r); ctx.lineTo(-p.r*1.2,0); ctx.lineTo(-p.r*0.6,-p.r); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }
  // 적 투사체
  for(const p of g.eProjectiles){ ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fillStyle='#ff6a4a'; ctx.fill(); }

  // 적
  for(const e of g.enemies){ const a=e.dead?Math.max(0,1-e.deathAge/0.3):1; drawEnemy(e,a); }
  // 동료(원군)
  if(g.allies) for(const a of g.allies){ if(!a.dead) drawAlly(a); }
  // 플레이어(기마)
  drawHeroMounted();
  // 파티클
  for(const pt of g.particles){ ctx.globalAlpha=Math.max(0,pt.life*2);
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fillStyle=pt.col; ctx.fill(); }
  ctx.globalAlpha=1;
  // 데미지 텍스트
  ctx.textAlign='center';
  for(const d of g.damageTexts){ ctx.globalAlpha=Math.max(0,d.life*2);
    ctx.font=d.crit?'bold 22px sans-serif':'bold 15px sans-serif';
    ctx.fillStyle=d.crit?'#ffd050':'#fff';
    if(d.crit){ ctx.strokeStyle='#a02010'; ctx.lineWidth=3; ctx.strokeText(d.v,d.x,d.y); }
    ctx.fillText(d.v,d.x,d.y); }
  ctx.globalAlpha=1;

  ctx.restore();
}

function drawGround(){
  ctx.strokeStyle='rgba(80,60,36,.22)'; ctx.lineWidth=1;
  const gs=64;
  const x0=Math.floor((G.px-W)/gs)*gs, x1=G.px+W;
  const y0=Math.floor((G.py-H)/gs)*gs, y1=G.py+H;
  for(let x=x0;x<x1;x+=gs){ ctx.beginPath(); ctx.moveTo(x,y0); ctx.lineTo(x,y1); ctx.stroke(); }
  for(let y=y0;y<y1;y+=gs){ ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke(); }
}

/* 병종별 적 그리기 */
function drawEnemy(e,alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  const flash=e.hitFlash>0; if(e.hitFlash>0) e.hitFlash-=0.016;
  const bob=Math.sin((G.animTick*6+e.animP))*2;
  // 엘리트 오라 (빛나는 금빛 원)
  if(e.elite && !e.dead){
    const pulse=0.5+Math.sin((e.eliteGlow||0)*5)*0.3;
    ctx.save(); ctx.globalAlpha=alpha*pulse;
    const gr=ctx.createRadialGradient(e.x,e.y+bob,e.r*0.5, e.x,e.y+bob,e.r*2.2);
    gr.addColorStop(0,'rgba(255,210,80,.5)'); gr.addColorStop(1,'rgba(255,180,40,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(e.x,e.y+bob,e.r*2.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  if(e.lord){
    // 특기 예고 렌더
    if(e.state==='telegraph'){
      // 돌진 조준선 (붉은 화살표)
      ctx.save(); ctx.globalAlpha=0.5+Math.sin(G.animTick*20)*0.2;
      ctx.strokeStyle='#ff4a3a'; ctx.lineWidth=5; ctx.setLineDash([12,8]);
      ctx.beginPath(); ctx.moveTo(e.x,e.y+bob);
      ctx.lineTo(e.x+Math.cos(e.telegraphDir)*400, e.y+Math.sin(e.telegraphDir)*400); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }
    if(e.state==='slamWind'){
      // 강타 경고원 (점점 커지는 붉은 원)
      ctx.save(); ctx.globalAlpha=0.35+Math.sin(G.animTick*24)*0.15;
      ctx.strokeStyle='#ff5a3a'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(e.x,e.y+bob, e.slamR||150, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(255,60,40,.12)'; ctx.fill();
      ctx.restore();
    }

    // 보스 초상화: 전용 적장 이미지 우선, 없으면 플레이어 무장 초상화 재활용 (필요 시 즉시 로딩)
    let bimg = getLordImg(e.lordName);
    const imgReady = bimg && bimg.complete && bimg.naturalWidth>0;
    // 기마
    drawHorse(e.x, e.y+bob, e.r, flash?'#fff':e.col, flash);
    if(imgReady){
      // 초상화를 말 위에 크게
      const isz=e.r*2.6;
      ctx.save(); if(flash){ ctx.globalAlpha=alpha*0.6; }
      ctx.drawImage(bimg, e.x-isz/2, e.y-isz*0.72+bob, isz, isz);
      ctx.restore();
    } else {
      // 깃발 (초상화 없는 적장)
      ctx.strokeStyle='#3a2a1a'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(e.x+e.r*0.5, e.y-e.r*0.6+bob); ctx.lineTo(e.x+e.r*0.5, e.y-e.r*1.8+bob); ctx.stroke();
      ctx.fillStyle=e.col; ctx.beginPath();
      ctx.moveTo(e.x+e.r*0.5, e.y-e.r*1.8+bob); ctx.lineTo(e.x+e.r*1.4, e.y-e.r*1.6+bob); ctx.lineTo(e.x+e.r*0.5, e.y-e.r*1.3+bob); ctx.fill();
    }
    // 외침
    if(e.shoutT>0){ e.shoutT-=0.016;
      ctx.globalAlpha=Math.min(1,e.shoutT*2); ctx.textAlign='center'; ctx.font='bold 18px sans-serif';
      ctx.fillStyle='#ff5a3a'; ctx.strokeStyle='#000'; ctx.lineWidth=4;
      ctx.strokeText(e.shoutTxt, e.x, e.y-e.r-40+bob); ctx.fillText(e.shoutTxt, e.x, e.y-e.r-40+bob);
      ctx.globalAlpha=alpha;
    }
    // 이름표
    ctx.globalAlpha=alpha; ctx.textAlign='center'; ctx.font='bold 13px sans-serif';
    ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=3;
    ctx.strokeText(e.lordName, e.x, e.y-e.r-24+bob); ctx.fillText(e.lordName, e.x, e.y-e.r-24+bob);
    ctx.restore(); return;
  }

  if(e.kind==='cav'){
    drawHorse(e.x, e.y+bob, e.r, flash?'#fff':e.col, flash);
  } else if(e.kind==='archer'){
    // 궁병: 활 든 보병
    ctx.beginPath(); ctx.arc(e.x,e.y+bob,e.r,0,Math.PI*2);
    ctx.fillStyle=flash?'#fff':e.col; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=2; ctx.stroke();
    // 활
    ctx.strokeStyle='#c9a05a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(e.x+e.r*0.6, e.y+bob, e.r*0.8, -1, 1); ctx.stroke();
    // 눈
    ctx.fillStyle='#1a1008';
    ctx.beginPath(); ctx.arc(e.x-e.r*0.3,e.y-e.r*0.1+bob,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x+e.r*0.3,e.y-e.r*0.1+bob,2,0,Math.PI*2); ctx.fill();
  } else {
    // 보병
    ctx.beginPath(); ctx.arc(e.x,e.y+bob,e.r,0,Math.PI*2);
    ctx.fillStyle=flash?'#fff':e.col; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=2; ctx.stroke();
    // 창
    ctx.strokeStyle='#8a7a5a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(e.x+e.r*0.4,e.y-e.r+bob); ctx.lineTo(e.x+e.r*0.9,e.y-e.r*1.6+bob); ctx.stroke();
    ctx.fillStyle='#1a1008';
    ctx.beginPath(); ctx.arc(e.x-e.r*0.3,e.y-e.r*0.1+bob,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x+e.r*0.3,e.y-e.r*0.1+bob,2,0,Math.PI*2); ctx.fill();
  }
  if(e.stun>0){ // 기절 별
    ctx.globalAlpha=alpha; ctx.fillStyle='#ffe680'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('✦', e.x, e.y-e.r-6+bob);
  }
  ctx.restore();
}

/* 말 그리기 (공용) */
function drawAlly(a){
  const bob=Math.sin((G.animTick*6+a.animP))*2;
  const y=a.y+bob;
  // 아군 표시: 발밑 청록 링
  ctx.save();
  ctx.globalAlpha=Math.min(1, a.life/2);   // 퇴장 직전 페이드
  ctx.strokeStyle='rgba(90,200,255,.8)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.ellipse(a.x,y+a.r*0.9,a.r*0.9,a.r*0.4,0,0,Math.PI*2); ctx.stroke();
  // 초상화 or 도트 몸통
  const img=a.slug?HERO_IMG[a.name]:null;
  if(img){
    const s=a.r*2.4;
    ctx.drawImage(img, a.x-s/2, y-s*0.7, s, s);
  } else {
    ctx.fillStyle=a.col; ctx.beginPath(); ctx.arc(a.x,y,a.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
    ctx.fillText(a.name[0], a.x, y+4);
  }
  // 이름표
  ctx.fillStyle='#8ad0ff'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText(a.name, a.x, y-a.r-6);
  ctx.restore();
}
function drawHorse(x,y,r,col,flash){
  ctx.save();
  // 말 몸통
  ctx.fillStyle=flash?'#fff':'#5a4030';
  ctx.beginPath(); ctx.ellipse(x, y+r*0.4, r*1.2, r*0.7, 0, 0, Math.PI*2); ctx.fill();
  // 말 목/머리
  ctx.beginPath(); ctx.ellipse(x-r*1.0, y+r*0.1, r*0.4, r*0.55, -0.5, 0, Math.PI*2); ctx.fill();
  // 다리
  ctx.strokeStyle=flash?'#fff':'#3a2818'; ctx.lineWidth=r*0.22;
  const legOff=Math.sin(G.animTick*10)*3;
  ctx.beginPath(); ctx.moveTo(x-r*0.6,y+r*0.9); ctx.lineTo(x-r*0.6+legOff,y+r*1.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+r*0.6,y+r*0.9); ctx.lineTo(x+r*0.6-legOff,y+r*1.5); ctx.stroke();
  // 기수(라이더)
  ctx.beginPath(); ctx.arc(x+r*0.1, y-r*0.5, r*0.55, 0, Math.PI*2);
  const grad=ctx.createRadialGradient(x-r*0.05,y-r*0.6,2,x+r*0.1,y-r*0.5,r*0.6);
  grad.addColorStop(0,'#f0dcb0'); grad.addColorStop(1,col);
  ctx.fillStyle=flash?'#fff':grad; ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}

/* 주인공 기마 */
function drawHeroMounted(){
  const g=G, h=g.hero, col=FAC_COLOR[h.f];
  ctx.save();
  const face=g.facing;
  ctx.translate(g.px,g.py); ctx.scale(-face,1);   // 말이 왼쪽 향해 그려져 있어 -face로 이동방향과 일치
  const bob=Math.sin(g.animTick*10)*2.5;
  // 그림자
  ctx.globalAlpha=1;
  ctx.beginPath(); ctx.ellipse(0,28,30,7,0,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fill();
  // === 적토마 (옆모습 실루엣, 왼쪽 향함) ===
  const R=17;
  const horseCol = g.buffSpd>0 ? '#d05a34' : '#7a3f26';
  const horseDark = g.buffSpd>0 ? '#a03a1e' : '#5a2e1a';
  const gallop = g.animTick*13;   // 질주 사이클
  drawWarhorse(R, bob, gallop, horseCol, horseDark);
  // 무장 — 그림이 있으면 그림, 없으면 코드 도트
  const himg = HERO_IMG[h.n];
  if(himg){
    // 말 위 상반신 위치에 그림 배치 (약간 크게)
    const isz=R*2.6;
    ctx.save();
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(himg, -isz/2+R*0.1, -isz*0.72+bob, isz, isz);
    ctx.restore();
  } else {
    // 무장 몸통
    ctx.beginPath(); ctx.arc(R*0.1,-R*0.5+bob,R*0.7,0,Math.PI*2);
    const grad=ctx.createRadialGradient(R*0.0,-R*0.7+bob,2,R*0.1,-R*0.5+bob,R*0.8);
    grad.addColorStop(0,'#f0dcb0'); grad.addColorStop(1,col);
    ctx.fillStyle=grad; ctx.fill(); ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();
    // 투구
    ctx.beginPath(); ctx.arc(R*0.1,-R*0.8+bob,R*0.5,Math.PI,0); ctx.fillStyle=col; ctx.fill();
    ctx.beginPath(); ctx.arc(R*0.1,-R*1.3+bob,2.5,0,Math.PI*2); ctx.fillStyle='#e8c05a'; ctx.fill();
  }
  // 무기 — 휘두르는 모션
  drawWeaponSwing(R, bob, col);
  // 무적 버프 오라
  if(g.buffInvul>0){ ctx.globalAlpha=0.5+Math.sin(g.animTick*12)*0.2;
    ctx.strokeStyle='#7ac0ff'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(R*0.1,-R*0.2+bob,R*1.6,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
  ctx.restore();
}

/* 군마(적토마) 옆모습 — drawHeroMounted 로컬 좌표계, 왼쪽 향함 */
function drawWarhorse(R, bob, gallop, col, dark){
  const y0 = bob;
  const sw1 = Math.sin(gallop);
  const sw2 = Math.sin(gallop+Math.PI);
  ctx.save();
  ctx.translate(0, y0);
  ctx.lineCap='round';

  // === 뒤쪽 다리 2개 (먼저, 몸통 뒤에) ===
  ctx.strokeStyle=dark; ctx.lineWidth=5;
  drawLeg(R*1.25, R*0.35, sw2, R);      // 뒷다리(먼쪽)
  drawLeg(-R*1.05, R*0.35, sw1, R);     // 앞다리(먼쪽)

  // === 몸통 === (등이 평평하고 배가 둥근 말 체형)
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(-R*1.25, -R*0.25);                          // 앞가슴 위
  ctx.quadraticCurveTo(-R*0.3,-R*0.62, R*0.9,-R*0.5);    // 등 (평평)
  ctx.quadraticCurveTo(R*1.55,-R*0.42, R*1.7,-R*0.05);   // 엉덩이
  ctx.quadraticCurveTo(R*1.78, R*0.3, R*1.5, R*0.4);     // 엉덩이 뒤 아래
  ctx.quadraticCurveTo(R*0.4, R*0.62, -R*0.9, R*0.42);   // 배
  ctx.quadraticCurveTo(-R*1.45, R*0.3, -R*1.4,-R*0.05);  // 앞다리 앞선
  ctx.quadraticCurveTo(-R*1.4,-R*0.18,-R*1.25,-R*0.25);
  ctx.closePath(); ctx.fill();

  // === 목 + 머리 (앞=왼쪽, 위로 솟았다 아래로) ===
  ctx.beginPath();
  ctx.moveTo(-R*1.1, -R*0.4);                            // 목 뿌리(어깨 위)
  ctx.quadraticCurveTo(-R*1.75,-R*0.75, -R*2.0,-R*0.55); // 목 앞선 → 이마
  ctx.quadraticCurveTo(-R*2.35,-R*0.4, -R*2.5,-R*0.05);  // 콧대
  ctx.lineTo(-R*2.45, R*0.18);                            // 주둥이 끝
  ctx.lineTo(-R*2.2, R*0.2);                              // 입 아래
  ctx.quadraticCurveTo(-R*2.0, R*0.05, -R*1.85,-R*0.1);  // 턱선
  ctx.quadraticCurveTo(-R*1.4, R*0.05, -R*1.0,-R*0.05);  // 목 뒷선 → 가슴
  ctx.closePath(); ctx.fill();

  // 귀
  ctx.beginPath();
  ctx.moveTo(-R*1.95,-R*0.6); ctx.lineTo(-R*2.05,-R*0.9); ctx.lineTo(-R*1.78,-R*0.62);
  ctx.closePath(); ctx.fill();

  // 갈기 (목 뒷선을 따라 뭉치들)
  ctx.strokeStyle=dark; ctx.lineWidth=3;
  for(let i=0;i<=6;i++){ const t=i/6;
    const bx=-R*1.05 - t*R*0.95, by=-R*0.42 - t*R*0.28;
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+R*0.14, by+R*0.34); ctx.stroke(); }

  // 눈
  ctx.fillStyle='#120c06';
  ctx.beginPath(); ctx.arc(-R*1.95,-R*0.38, R*0.1, 0, Math.PI*2); ctx.fill();

  // === 꼬리 (뒤=오른쪽) ===
  ctx.strokeStyle=dark; ctx.lineWidth=6;
  const tsw=Math.sin(gallop*0.6)*R*0.18;
  ctx.beginPath();
  ctx.moveTo(R*1.68,-R*0.05);
  ctx.quadraticCurveTo(R*2.15, R*0.35+tsw, R*1.95, R*0.95+tsw);
  ctx.stroke();
  ctx.lineWidth=3.5;
  ctx.beginPath();
  ctx.moveTo(R*1.7, R*0.02);
  ctx.quadraticCurveTo(R*2.3, R*0.4+tsw, R*2.15, R*1.05+tsw);
  ctx.stroke();

  // === 가까운 앞다리 2개 (몸통 위 덮어그림) ===
  ctx.strokeStyle=col; ctx.lineWidth=6;
  drawLeg(-R*1.0, R*0.35, sw2, R);      // 앞다리(가까운쪽)
  drawLeg(R*1.3, R*0.35, sw1, R);       // 뒷다리(가까운쪽)

  ctx.restore();
}
/* 다리: 어깨(hx,hy)→무릎→발굽, sw=질주 스윙(-1~1) */
function drawLeg(hx, hy, sw, R){
  const kneeX=hx + sw*R*0.35;
  const kneeY=hy + R*0.62;
  const hoofX=hx + sw*R*0.7;
  const hoofY=hy + R*1.35;
  ctx.beginPath();
  ctx.moveTo(hx,hy); ctx.lineTo(kneeX,kneeY); ctx.lineTo(hoofX,hoofY); ctx.stroke();
  ctx.save(); ctx.fillStyle='#1e120a';
  ctx.beginPath(); ctx.arc(hoofX,hoofY,R*0.14,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

/* 무기 휘두르기 모션 — drawHeroMounted 로컬 좌표계(face 스케일 적용됨) 안에서 호출 */
function drawWeaponSwing(R, bob, col){
  const g=G;
  // 어깨(무기 손잡이) 위치
  const sx=R*0.35, sy=-R*0.55+bob;
  // 스윙 진행도 0(시작)~1(끝). 없으면 대기 자세
  const prog = g.swingT>0 ? 1-(g.swingT/g.swingDur) : -1;
  const type = g.swingType;

  ctx.save();
  ctx.translate(sx, sy);

  // 필살기 치켜든 포즈 (freeze 동안)
  if(g.ultPose){
    // 무기를 머리 위로 수직에 가깝게 치켜듦 + 진동
    const shiver=Math.sin(g.animTick*40)*0.04;
    // 금빛 기 오라
    ctx.save();
    ctx.globalAlpha=0.4+Math.sin(g.animTick*20)*0.2;
    const grd=ctx.createRadialGradient(0,-R*0.5,2,0,-R*0.5,R*3.2);
    grd.addColorStop(0,'rgba(255,230,140,.6)'); grd.addColorStop(1,'rgba(255,180,60,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(0,-R*0.5,R*3.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // 치켜든 무기 (거의 수직, 위로)
    drawBlade(type, -1.75+shiver, R*1.15, col, 1);
    // 위로 솟는 빛줄기
    ctx.strokeStyle='rgba(255,240,180,.7)'; ctx.lineWidth=4;
    for(let i=0;i<3;i++){ const ox=(i-1)*R*0.4;
      ctx.beginPath(); ctx.moveTo(ox,-R*1.2); ctx.lineTo(ox,-R*3.0-Math.sin(g.animTick*15+i)*R*0.3); ctx.stroke(); }
    ctx.restore(); return;
  }

  if(prog<0){
    // 대기: 무기를 비스듬히 세워 든 자세
    const idle=Math.sin(g.animTick*4)*0.06;
    drawBlade(type, -0.9+idle, R, col, 1);
    ctx.restore(); return;
  }

  if(type==='slash' || type==='spin'){
    // 위(-2.4rad)에서 아래-앞(0.5rad)으로 내려베기, ease-out
    const e=1-Math.pow(1-prog,2);
    const ang=-2.4 + e*2.9;
    // 잔상 트레일 (여러 각도 반투명)
    for(let i=1;i<=4;i++){
      const t=Math.max(0, e-i*0.12);
      const a=-2.4+t*2.9;
      drawBlade(type, a, R, col, 0.14*(4-i));
    }
    drawBlade(type, ang, R, col, 1);
    // 참격 호 트레일
    ctx.globalAlpha=0.5*(1-prog);
    ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0, R*1.5, -2.4, ang); ctx.stroke();
    ctx.globalAlpha=1;
  }
  else if(type==='thrust'){
    // 앞으로 찌르기: 0~0.5 전진, 0.5~1 복귀
    const ext = prog<0.5 ? (prog/0.5) : (1-(prog-0.5)/0.5);
    const reach = R*0.4 + ext*R*1.4;
    ctx.save();
    ctx.rotate(-0.15);
    // 창대
    ctx.strokeStyle='#7a5a34'; ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.moveTo(-R*0.3,0); ctx.lineTo(reach,0); ctx.stroke();
    // 창날
    ctx.fillStyle='#e8e0c8'; ctx.beginPath();
    ctx.moveTo(reach,0); ctx.lineTo(reach-R*0.5,-R*0.18); ctx.lineTo(reach-R*0.35,0); ctx.lineTo(reach-R*0.5,R*0.18); ctx.closePath(); ctx.fill();
    // 잔상
    ctx.globalAlpha=0.4*ext; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(reach-R*1.2,0); ctx.lineTo(reach,0); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.restore();
  }
  else if(type==='bow'){
    // 활 당겼다 놓기
    const draw = prog<0.4 ? (prog/0.4) : (1-(prog-0.4)/0.6);
    ctx.strokeStyle='#c9a05a'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(R*0.5, 0, R*0.9, -1.1, 1.1); ctx.stroke();
    // 시위
    ctx.strokeStyle='rgba(240,230,200,.8)'; ctx.lineWidth=1.2;
    const bx=R*0.5+Math.cos(-1.1)*R*0.9, by=Math.sin(-1.1)*R*0.9;
    const ex=R*0.5+Math.cos(1.1)*R*0.9, ey=Math.sin(1.1)*R*0.9;
    const pull=R*(0.1 - draw*0.5);
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(R*0.5+pull,0); ctx.lineTo(ex,ey); ctx.stroke();
  }
  ctx.restore();
}

/* 칼/도 한 자루를 주어진 각도로 그림 */
function drawBlade(type, ang, R, col, alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.rotate(ang);
  const len = (type==='spin') ? R*2.0 : R*1.8;
  // 자루
  ctx.strokeStyle='#5a3a22'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(len*0.32,0); ctx.stroke();
  // 날 (청룡언월도풍: 끝이 넓어지는 곡도)
  ctx.strokeStyle='#e2ddc8'; ctx.lineWidth=4.5;
  ctx.beginPath(); ctx.moveTo(len*0.32,0); ctx.lineTo(len,0); ctx.stroke();
  // 날 하이라이트
  ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(len*0.34,-1); ctx.lineTo(len*0.98,-1); ctx.stroke();
  // 언월도 갈고리 (spin 계열만)
  if(type==='spin'){
    ctx.fillStyle='#e2ddc8'; ctx.beginPath();
    ctx.moveTo(len*0.78,0); ctx.quadraticCurveTo(len*0.95,-R*0.4, len*1.05,-R*0.12);
    ctx.quadraticCurveTo(len*0.92,-R*0.02, len*0.78,0); ctx.fill();
  }
  ctx.restore();
}

/* =========================================================
   HUD
   ========================================================= */
function updateHUD(){
  const g=G; if(!g) return;
  $('xpFill').style.width=(g.xp/g.xpNext*100)+'%';
  $('lvlBadge').textContent='Lv.'+g.level;
  // 진행도: 장 + 킬목표 (보스전이면 표시 전환)
  const sc=SCENARIO[g.chapter];
  if(g.bossActive){ $('progress').textContent=(g.chapter+1)+'장 · 보스전'; }
  else { $('progress').textContent=(g.chapter+1)+'장 · '+Math.min(g.chapterKills,sc.killGoal)+'/'+sc.killGoal; }
  $('kills').textContent='☠ '+g.kills;
  $('hpFill').style.width=(g.hp/g.maxHp*100)+'%';
  $('hpLabel').textContent=Math.ceil(g.hp)+' / '+g.maxHp;
  // 보스 체력바
  const boss=g.enemies.find(e=>e.lord && !e.dead);
  if(boss && g.bossActive){
    $('bossHpWrap').classList.add('on');
    $('bossHpName').textContent='◆ '+boss.lordName+' ◆';
    $('bossHpFill').style.width=(boss.hp/boss.maxHp*100)+'%';
  } else { $('bossHpWrap').classList.remove('on'); }
  // 스킬 쿨다운 오버레이 (남은 비율)
  const s1r=g.s1cd>0? g.s1cd/(g.hero.s1.cd*g.cdrMul):0;
  const s2r=g.s2cd>0? g.s2cd/(g.hero.s2.cd*g.cdrMul):0;
  $('s1cd').style.height=(s1r*100)+'%'; $('s2cd').style.height=(s2r*100)+'%';
  $('ultcd').style.height=g.ultReady?'0%':((1-g.ultCharge/g.ultMax)*100)+'%';
  $('skill1Btn').classList.toggle('ready', g.s1cd<=0);
  $('skill2Btn').classList.toggle('ready', g.s2cd<=0);
  $('ultBtn').classList.toggle('ready', g.ultReady);
}

/* =========================================================
   승패
   ========================================================= */
function winGame(){
  G.gameOver=true; endLoop(); $('hud').classList.remove('on');
  BGM.setMode('menu');
  const info=G_scenarioInfo||{name:'삼국 정벌'};
  const winMsg = { '촉':'한실을 부흥하고 천하를 평정했다!', '위':'천하를 통일하여 위업을 완성했다!',
    '오':'강동을 지켜내고 강남의 패자가 되었다!', '기타':'천하 제일의 무장, 그 이름을 새겼다!' };
  $('resultTitle').className='result-title win'; $('resultTitle').textContent='천하통일';
  showResult(`「${info.name}」 완수 — ${winMsg[info.faction]||'삼국을 평정했다!'}`);
  vib([100,60,100,60,150]);
}
function loseGame(){
  G.gameOver=true; endLoop(); $('hud').classList.remove('on');
  BGM.setMode('menu');
  $('resultTitle').className='result-title lose'; $('resultTitle').textContent='전 사';
  const sc=SCENARIO[G.chapter];
  showResult(`${sc.chapter} 「${sc.title}」에서 전사`); vib([100,50,100]);
}
function showResult(sub){
  const g=G;
  // 전공(戰功) 계산: 처치 + 진행 장 보너스 + 승리 보너스
  const won = g.won || (g.chapter>=SCENARIO.length-1 && !g.enemies.some(e=>e.lord&&!e.dead) && $('resultTitle').textContent==='천하통일');
  const isWin = $('resultTitle').classList.contains('win');
  const gong = Math.round(g.kills*0.5 + g.chapter*15 + (isWin?100:0) + g.level*2);
  META.gongxun = (META.gongxun||0) + gong;
  saveMeta(META);
  $('resultStat').innerHTML=`<b style="color:${FAC_COLOR[g.hero.f]}">${g.hero.n}</b> · ${sub}<br><br>`+
    `총 처치 <b style="color:#e8756a">${g.kills}</b>명 · 도달 레벨 ${g.level}<br>`+
    `<span style="color:#ffd050">🎖️ 전공 +${gong}</span> <span style="color:#9a8666">(보유 ${META.gongxun})</span>`;
  setTimeout(()=>show('resultScreen'),600);
}
