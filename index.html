<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>무쌍기 — 無雙記</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  :root{ --gold:#e8c05a; --shu:#3f8f5f; --wei:#4a6fa5; --wu:#c0392b; --other:#8e7cc3; }
  html,body{ height:100%; background:#0a0806; overflow:hidden; overscroll-behavior:none;
    font-family:-apple-system,"Noto Sans KR","Malgun Gothic",sans-serif; color:#f3e9d2; touch-action:none; }
  #app{ position:fixed; inset:0; }
  canvas{ display:block; width:100%; height:100%; background:#1a1208; }

  .screen{ position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    z-index:20; padding:16px; text-align:center; }
  .screen.on{ display:flex; }
  .brush-title{ font-size:64px; font-weight:900; letter-spacing:8px; line-height:1;
    background:linear-gradient(180deg,#f6e4a8,#c99a3a); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 4px 30px rgba(200,150,50,.4); }
  .sub-title{ font-size:15px; color:#b09a72; margin-top:8px; letter-spacing:4px; }
  .menu-btn{ margin-top:26px; padding:15px 46px; font-size:21px; font-weight:700; color:#1a1410;
    background:linear-gradient(180deg,#f0d382,#d0a444); border:none; border-radius:12px;
    box-shadow:0 6px 0 #8a6a20, 0 10px 20px rgba(0,0,0,.4); cursor:pointer; }
  .menu-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #8a6a20; }
  .menu-btn.sm{ font-size:15px; padding:11px 30px; margin-top:12px;
    background:linear-gradient(180deg,#4a4038,#332b24); color:#e8dcc0; box-shadow:0 4px 0 #1a1410; }

  /* 무장 선택 — 그리드로 고정, 글자 잘림 방지 */
  #selectScreen{ justify-content:flex-start; padding:14px 12px; overflow-y:auto; }
  .sel-head{ font-size:24px; font-weight:800; color:var(--gold); }
  .sel-sub{ font-size:13px; color:#9a8666; margin:4px 0 12px; }
  .hero-grid{ display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:10px;
    width:100%; max-width:760px; }
  .hero-card{ background:rgba(30,22,16,.92); border:2px solid #3a2e22; border-radius:14px;
    padding:12px 10px; cursor:pointer; transition:transform .1s,border-color .1s; min-width:0;
    display:flex; flex-direction:column; align-items:center; text-align:center; overflow:hidden; }
  .hero-card:active{ transform:scale(.96); }
  .hero-card:hover{ border-color:var(--gold); }
  .hero-portrait{ width:64px; height:64px; margin:0 auto; flex:0 0 auto; border-radius:50%; overflow:hidden; }
  .hero-portrait svg{ display:block; width:64px !important; height:64px !important; }
  .hp-nm{ font-size:17px; font-weight:900; margin-top:5px; }
  .hp-wpn{ font-size:12px; color:var(--gold); margin-top:3px; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hp-ult{ font-size:11.5px; color:#d8a8e8; margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hp-stat{ font-size:11px; color:#9a8666; margin-top:5px; }

  /* HUD */
  #hud{ position:absolute; inset:0; z-index:10; pointer-events:none; display:none; }
  #hud.on{ display:block; }
  .top-bar{ position:absolute; top:0; left:0; right:0; padding:8px 14px; }
  .xp-track{ height:9px; background:rgba(0,0,0,.55); border:1px solid #3a2e22; border-radius:5px; overflow:hidden; }
  .xp-fill{ height:100%; background:linear-gradient(90deg,#4a9fe8,#7ac0ff); width:0%; transition:width .15s; }
  .top-info{ display:flex; justify-content:space-between; align-items:center; margin-top:4px; font-size:13px; font-weight:800; }
  .lvl-badge{ color:var(--gold); }
  .timer{ color:#f3e9d2; font-variant-numeric:tabular-nums; }
  .kills{ color:#e8756a; }
  .hp-track{ position:absolute; bottom:12px; left:14px; width:min(38vw,260px); height:14px;
    background:rgba(0,0,0,.55); border:1px solid #3a2e22; border-radius:7px; overflow:hidden; }
  .hp-fill{ height:100%; background:linear-gradient(90deg,#c0392b,#e35d4d); width:100%; transition:width .2s; }
  .hp-label{ position:absolute; bottom:28px; left:14px; font-size:12px; color:#e8a0a0; font-weight:700; }

  /* 스킬 버튼 그룹 (우하단) */
  .skill-group{ position:absolute; bottom:12px; right:12px; display:flex; align-items:flex-end; gap:10px; pointer-events:none; }
  .skill-btn{ position:relative; border-radius:50%; overflow:hidden; pointer-events:auto; cursor:pointer;
    touch-action:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .skill-btn .sb-ic{ font-size:24px; z-index:2; }
  .skill-btn .sb-nm{ font-size:9px; font-weight:800; color:#c9b78c; z-index:2; margin-top:-2px; }
  .skill-btn .sb-cd{ position:absolute; left:0; right:0; bottom:0; background:rgba(0,0,0,.55); z-index:1; height:0%; transition:height .1s linear; }
  .skill-btn.s1{ width:60px; height:60px; background:radial-gradient(circle at 40% 35%,#3a5a8a,#1a2a44); border:2px solid #3a4a6a; }
  .skill-btn.s2{ width:60px; height:60px; background:radial-gradient(circle at 40% 35%,#8a4a3a,#442018); border:2px solid #6a3a2a; }
  .skill-btn.ult{ width:94px; height:94px; background:radial-gradient(circle at 40% 35%,#6a5230,#2a1e10); border:3px solid #4a3a22; }
  .skill-btn.ult .sb-ic{ font-size:38px; }
  .skill-btn.ult .sb-nm{ font-size:12px; }
  .skill-btn.ready{ animation:sbPulse 1s infinite; }
  .skill-btn.s1.ready{ border-color:#7ac0ff; box-shadow:0 0 14px rgba(122,192,255,.6); }
  .skill-btn.s1.ready .sb-nm{ color:#7ac0ff; }
  .skill-btn.s2.ready{ border-color:#ff9a6a; box-shadow:0 0 14px rgba(255,154,106,.6); }
  .skill-btn.s2.ready .sb-nm{ color:#ff9a6a; }
  .skill-btn.ult.ready{ border-color:var(--gold); box-shadow:0 0 28px rgba(232,192,90,.9), inset 0 0 20px rgba(232,192,90,.4);
    animation:ultReadyPulse .8s infinite; }
  .skill-btn.ult.ready .sb-nm{ color:var(--gold); }
  .skill-btn.ult.ready::before{ content:''; position:absolute; inset:-6px; border-radius:50%;
    border:2px dashed var(--gold); animation:ultSpin 3s linear infinite; opacity:.7; }
  @keyframes ultReadyPulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
  @keyframes ultSpin{ from{transform:rotate(0)} to{transform:rotate(360deg)} }
  #toast{ position:absolute; top:64px; left:50%; transform:translateX(-50%); z-index:19; pointer-events:none;
    background:rgba(20,14,10,.92); border:1px solid var(--gold); border-radius:10px; padding:8px 18px;
    font-size:14px; font-weight:700; color:#f0e0b0; opacity:0; white-space:nowrap; }
  #toast.go{ animation:toastAnim 2s ease-out; }
  @keyframes toastAnim{ 0%{opacity:0;transform:translate(-50%,-8px)} 12%,72%{opacity:1;transform:translate(-50%,0)} 100%{opacity:0;transform:translate(-50%,-8px)} }
  @keyframes sbPulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

  /* 조이스틱 */
  #joyZone{ position:absolute; left:0; top:0; bottom:0; width:55%; z-index:8; pointer-events:auto; }
  #joyBase{ position:absolute; width:130px; height:130px; border-radius:50%; border:2px solid rgba(232,192,90,.3);
    background:rgba(0,0,0,.2); display:none; z-index:9; }
  #joyStick{ position:absolute; width:54px; height:54px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, rgba(232,192,90,.7), rgba(140,110,50,.5)); display:none; z-index:9; }

  /* 레벨업 */
  #levelupScreen{ background:rgba(10,6,4,.92); }
  .lvl-head{ font-size:34px; font-weight:900; color:var(--gold); text-shadow:0 0 20px rgba(232,192,90,.5); }
  .lvl-sub{ font-size:15px; color:#b09a72; margin:5px 0 18px; }
  .upgrade-row{ display:flex; gap:12px; width:100%; max-width:760px; justify-content:center; flex-wrap:wrap; }
  .up-card{ flex:1; min-width:150px; max-width:230px; background:rgba(30,22,16,.95); border:2px solid #4a3a28; border-radius:16px;
    padding:18px 14px; cursor:pointer; transition:transform .1s,border-color .1s; position:relative; }
  .up-card:active{ transform:scale(.96); }
  .up-card .up-ic{ font-size:38px; }
  .up-card .up-t{ font-size:18px; font-weight:800; margin-top:5px; }
  .up-card .up-d{ font-size:13px; color:#c9b78c; margin-top:7px; line-height:1.4; }
  .up-card .up-lv{ position:absolute; top:9px; right:11px; font-size:11px; font-weight:800; color:#9a8666; }
  .up-card.rar-r{ border-color:#4a9fe8; }
  .up-card.rar-e{ border-color:#c07ae8; box-shadow:0 0 16px rgba(192,122,232,.3); }

  /* 결과 */
  .result-title{ font-size:60px; font-weight:900; letter-spacing:6px; }
  .result-title.win{ background:linear-gradient(180deg,#f6e4a8,#c99a3a); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .result-title.lose{ color:#7a6a5a; }
  .result-stat{ font-size:15px; color:#b09a72; margin-top:14px; line-height:2; }

  /* 필살기/기술 풀스크린 연출 */
  #fxFlash{ position:absolute; inset:0; z-index:15; pointer-events:none; opacity:0;
    background:radial-gradient(circle at center, rgba(255,240,200,.7), rgba(232,150,60,.3) 50%, transparent 75%); }
  #fxFlash.go{ animation:fxFl .6s ease-out; }
  @keyframes fxFl{ 0%{opacity:0;transform:scale(.3)} 20%{opacity:1} 100%{opacity:0;transform:scale(1.8)} }
  #fxName{ position:absolute; top:34%; left:50%; transform:translate(-50%,-50%); z-index:16; pointer-events:none;
    font-size:52px; font-weight:900; color:var(--gold); text-shadow:0 0 30px rgba(232,192,90,.8),0 4px 8px #000;
    opacity:0; white-space:nowrap; letter-spacing:4px; }
  #fxName.go{ animation:fxNm 1.1s ease-out; }
  @keyframes fxNm{ 0%{opacity:0;transform:translate(-50%,-50%) scale(2)} 25%{opacity:1;transform:translate(-50%,-50%) scale(1)} 75%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)} }

  /* 100킬 마일스톤 대형 메시지 */
  #bigMsg{ position:absolute; top:42%; left:50%; transform:translate(-50%,-50%); z-index:18; pointer-events:none;
    text-align:center; opacity:0; }
  #bigMsg.go{ animation:bigMsgAnim 1.6s cubic-bezier(.2,.8,.2,1); }
  #bigMsg .bm-sub{ font-size:22px; font-weight:800; color:#fff; letter-spacing:6px; margin-bottom:2px;
    text-shadow:0 2px 8px #000; }
  #bigMsg .bm-main{ font-size:72px; font-weight:900; letter-spacing:4px; white-space:nowrap;
    background:linear-gradient(180deg,#fff2c0,#e8a53a 60%,#c0392b);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(232,120,50,.7); -webkit-text-stroke:2px rgba(80,20,10,.4); }
  @keyframes bigMsgAnim{
    0%{opacity:0;transform:translate(-50%,-50%) scale(2.4) rotate(-4deg)}
    18%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}
    30%{transform:translate(-50%,-50%) scale(1.08)}
    75%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
  }
  /* 크리티컬 비네트 */
  #critVig{ position:absolute; inset:0; z-index:14; pointer-events:none; opacity:0;
    box-shadow:inset 0 0 120px 40px rgba(200,40,20,.6); }
  #critVig.go{ animation:critV .5s ease-out; }
  @keyframes critV{ 0%{opacity:0} 20%{opacity:1} 100%{opacity:0} }

  /* 적장 등장 연출 */
  #bossIntro{ position:absolute; inset:0; z-index:22; pointer-events:none; display:none;
    flex-direction:column; align-items:center; justify-content:center; background:rgba(6,4,2,.55); }
  #bossIntro.on{ display:flex; }
  .bi-band{ position:absolute; left:0; right:0; height:130px; top:50%; transform:translateY(-50%);
    background:linear-gradient(90deg, transparent, rgba(20,10,6,.92) 20%, rgba(20,10,6,.92) 80%, transparent);
    display:flex; align-items:center; justify-content:center; gap:20px;
    border-top:2px solid var(--gold); border-bottom:2px solid var(--gold);
    transform:translateY(-50%) scaleX(0); animation:biBand .5s ease-out forwards; }
  @keyframes biBand{ to{ transform:translateY(-50%) scaleX(1); } }
  .bi-portrait{ width:96px; height:96px; filter:drop-shadow(0 0 12px rgba(0,0,0,.6)); }
  .bi-txt{ text-align:left; }
  .bi-name{ font-size:34px; font-weight:900; letter-spacing:2px; }
  .bi-quote{ font-size:16px; color:#e8dcc0; margin-top:6px; max-width:420px; }
  .bi-title{ font-size:13px; color:var(--gold); font-weight:700; margin-bottom:2px; }

  .rotate-hint{ position:absolute; inset:0; z-index:50; background:#0a0806; display:none;
    flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
  .rotate-hint.on{ display:flex; }
  .rotate-hint .ic{ font-size:70px; animation:rot 2s infinite; }
  @keyframes rot{ 0%,100%{transform:rotate(0)} 50%{transform:rotate(90deg)} }
</style>
<meta name="theme-color" content="#1a1208">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="無雙記">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="top-bar">
      <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
      <div class="top-info">
        <span class="lvl-badge" id="lvlBadge">Lv.1</span>
        <span class="timer" id="timer">00:00</span>
        <span class="kills" id="kills">☠ 0</span>
      </div>
    </div>
    <div class="hp-label" id="hpLabel"></div>
    <div class="hp-track"><div class="hp-fill" id="hpFill"></div></div>

    <div class="skill-group">
      <div class="skill-btn s1" id="skill1Btn">
        <div class="sb-cd" id="s1cd"></div>
        <div class="sb-ic" id="s1ic">🌀</div>
        <div class="sb-nm" id="s1nm">기술1</div>
      </div>
      <div class="skill-btn s2" id="skill2Btn">
        <div class="sb-cd" id="s2cd"></div>
        <div class="sb-ic" id="s2ic">💥</div>
        <div class="sb-nm" id="s2nm">기술2</div>
      </div>
      <div class="skill-btn ult" id="ultBtn">
        <div class="sb-cd" id="ultcd"></div>
        <div class="sb-ic" id="ultIc">🐉</div>
        <div class="sb-nm" id="ultNm">필살기</div>
      </div>
    </div>
  </div>

  <div id="joyBase"></div>
  <div id="joyStick"></div>
  <div id="joyZone"></div>

  <div id="fxFlash"></div>
  <div id="critVig"></div>
  <div id="fxName"></div>
  <div id="bigMsg"><div class="bm-sub" id="bmSub"></div><div class="bm-main" id="bmMain"></div></div>
  <div id="toast"></div>

  <div id="bossIntro"><div class="bi-band" id="biBand"></div></div>

  <div class="screen on" id="titleScreen">
    <div class="brush-title">無雙記</div>
    <div class="sub-title">무 쌍 기 · 일기당천</div>
    <button class="menu-btn" onclick="goSelect()">출진</button>
    <button class="menu-btn sm" onclick="showHelp()">조작 방법</button>
  </div>

  <div class="screen" id="selectScreen">
    <div class="sel-head">무장을 택하라</div>
    <div class="sel-sub">기본공격은 자동 · 기술 2종 + 필살기는 버튼으로 발동</div>
    <div class="hero-grid" id="heroGrid"></div>
  </div>

  <div class="screen" id="levelupScreen">
    <div class="lvl-head" id="lvlHead">LEVEL UP!</div>
    <div class="lvl-sub">강화를 하나 택하라</div>
    <div class="upgrade-row" id="upgradeRow"></div>
  </div>

  <div class="screen" id="resultScreen">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-stat" id="resultStat"></div>
    <button class="menu-btn" onclick="goSelect()">다시 출진</button>
    <button class="menu-btn sm" onclick="toTitle()">타이틀로</button>
  </div>

  <div class="rotate-hint" id="rotateHint">
    <div class="ic">📱</div>
    <div style="font-size:20px;font-weight:800;color:#e8c05a;margin-top:18px">기기를 가로로 돌려주세요</div>
    <div style="font-size:15px;color:#b09a72;margin-top:8px">가로 모드에 최적화된 게임입니다</div>
  </div>
</div>

<script>
/* =========================================================
   무장 — 기본공격 + 기술1 + 기술2 + 필살기
   ========================================================= */
const FAC_COLOR={"촉":"#3f8f5f","위":"#4a6fa5","오":"#c0392b","기타":"#8e7cc3"};
const HEROES=[
  { n:"관우", f:"촉", mig:97, ldr:94, spd:2.2,
    wpn:{name:"청룡언월도", type:"spin", dmg:26, range:100, rate:52},
    s1:{name:"참마도", ic:"🌀", cd:5, desc:"주위 광역 회전참격"},
    s2:{name:"의기충천", ic:"🛡️", cd:10, desc:"3초 무적+공격력↑"},
    ult:{name:"청룡참", ic:"🐉", desc:"전방을 관통하는 거대 참격"} },
  { n:"조운", f:"촉", mig:96, ldr:91, spd:2.7,
    wpn:{name:"용담창", type:"pierce", dmg:20, range:240, rate:34},
    s1:{name:"난격", ic:"➡️", cd:4, desc:"전방 다연장 창격"},
    s2:{name:"질풍", ic:"🏃", cd:8, desc:"짧은 순간이동 돌진"},
    ult:{name:"칠진돌파", ic:"⚡", desc:"사방으로 창격 난사"} },
  { n:"장비", f:"촉", mig:98, ldr:70, spd:2.0,
    wpn:{name:"장팔사모", type:"cone", dmg:34, range:135, rate:60},
    s1:{name:"단월", ic:"💢", cd:5, desc:"전방 강타+넉백"},
    s2:{name:"호통", ic:"📢", cd:9, desc:"주변 적 기절"},
    ult:{name:"당양대갈", ic:"🔊", desc:"전체 밀치고 기절"} },
  { n:"여포", f:"기타", mig:100, ldr:60, spd:2.9,
    wpn:{name:"방천화극", type:"spin", dmg:30, range:92, rate:40},
    s1:{name:"극무", ic:"🔥", cd:4, desc:"고속 연속 회전"},
    s2:{name:"패기", ic:"⚡", cd:8, desc:"이속+공속 대폭↑"},
    ult:{name:"무쌍난무", ic:"🀄", desc:"광역 연속 참격 폭발"} },
  { n:"황충", f:"촉", mig:93, ldr:83, spd:2.3,
    wpn:{name:"철태궁", type:"shoot", dmg:22, range:360, rate:40},
    s1:{name:"관통사", ic:"🎯", cd:4, desc:"강력 관통 화살"},
    s2:{name:"난사", ic:"🏹", cd:9, desc:"부채꼴 다발 사격"},
    ult:{name:"연노난사", ic:"🌧️", desc:"화면 전체 화살비"} },
  { n:"태사자", f:"오", mig:93, ldr:85, spd:2.6,
    wpn:{name:"쌍철극", type:"cone", dmg:24, range:115, rate:44},
    s1:{name:"연격", ic:"⚔️", cd:4, desc:"전방 빠른 연속타"},
    s2:{name:"맹진", ic:"🐎", cd:8, desc:"돌진하며 관통"},
    ult:{name:"쌍극선풍", ic:"🌪️", desc:"회전하며 전방위 참격"} }
];

/* 적 장수 — 등장 대사 */
const ENEMY_LORDS=[

    dmgMul:1.4, rateMul:0.9, rangeMul:1.35, spdMul:1.15,   // 강화된 시작치 (진삼국무쌍 감)
    regen:0, ultRate:1, pickupR:150, pierce:1, vamp:0, crit:0.08, cdrMul:1,
    level:1, xp:0, xpNext:4, kills:0, time:0, lastMilestone:0,
    ultCharge:0, ultMax:100, ultReady:false,
    s1cd:0, s2cd:0, buffInvul:0, buffAtk:0, buffSpd:0,
    upLevels:{}, _paused:false,
    enemies:[], projectiles:[], eProjectiles:[], orbs:[], particles:[], damageTexts:[], slashes:[],
    wpnTimer:0, spawnTimer:0, gameOver:false, won:false,

  };

const joyZone=$('joyZone'), joyBase=$('joyBase'), joyStick=$('joyStick');
let joyActive=false, joyId=null, joyCx=0, joyCy=0, joyDx=0, joyDy=0;
const JOY_R=65;
joyZone.addEventListener('pointerdown', e=>{
  if(!running||!G||G.gameOver||G._paused) return;
  joyActive=true; joyId=e.pointerId; joyCx=e.clientX; joyCy=e.clientY;
  joyBase.style.display='block'; joyStick.style.display='block';
  joyBase.style.left=(joyCx-JOY_R)+'px'; joyBase.style.top=(joyCy-JOY_R)+'px';
  joyStick.style.left=(joyCx-27)+'px'; joyStick.style.top=(joyCy-27)+'px';
});
joyZone.addEventListener('pointermove', e=>{
  if(!joyActive||e.pointerId!==joyId) return;
  let dx=e.clientX-joyCx, dy=e.clientY-joyCy; const dist=Math.hypot(dx,dy);
  if(dist>JOY_R){ dx=dx/dist*JOY_R; dy=dy/dist*JOY_R; }
  joyDx=dx/JOY_R; joyDy=dy/JOY_R;
  joyStick.style.left=(joyCx+dx-27)+'px'; joyStick.style.top=(joyCy+dy-27)+'px';
});
function joyEnd(e){ if(e.pointerId!==joyId) return; joyActive=false; joyId=null; joyDx=0; joyDy=0;
  joyBase.style.display='none'; joyStick.style.display='none'; }
joyZone.addEventListener('pointerup', joyEnd);
joyZone.addEventListener('pointercancel', joyEnd);

/* =========================================================
   메인 루프
   ========================================================= */
function loop(now){
  if(!running) return;
  let dt=(now-lastT)/1000; lastT=now;
  if(dt>0.05) dt=0.05;
  // 줌/슬로우 보간
  zoom += (zoomTarget-zoom)*Math.min(1,dt*8);
  if(camShake>0) camShake=Math.max(0,camShake-dt*3);
  if(!G.gameOver && !G._paused) update(dt*timeScale);
  render();
  rafId=requestAnimationFrame(loop);
}

function update(dt){
  const g=G, h=g.hero; g.time+=dt; g.animTick+=dt;
  if(g.time>=300 && !g.won){ g.won=true; winGame(); return; }

  // 버프 타이머
  if(g.buffInvul>0) g.buffInvul-=dt;
  if(g.buffAtk>0) g.buffAtk-=dt;
  if(g.buffSpd>0) g.buffSpd-=dt;
  if(g.s1cd>0) g.s1cd-=dt;
  if(g.s2cd>0) g.s2cd-=dt;
  if(g.swingT>0) g.swingT-=dt;

  // 이동
  let spd=h.spd*60*g.spdMul*(g.buffSpd>0?1.8:1);
  g.px+=joyDx*spd*dt; g.py+=joyDy*spd*dt;
  if(joyDx!==0) g.facing=joyDx>0?1:-1;
  g.px=Math.max(30,Math.min(g.worldW-30,g.px)); g.py=Math.max(30,Math.min(g.worldH-30,g.py));

  if(g.regen>0) g.hp=Math.min(g.maxHp,g.hp+g.regen*dt);

  // 적 장수 등장 트리거
  if(!g.lordActive && g.time>=g.nextLordAt){
    spawnLord();
  }

  // 적 스폰 — 진삼국무쌍처럼 우글우글
  g.spawnTimer-=dt;
  const spawnInterval=Math.max(0.04, 0.40 - g.time*0.0016);
  if(g.spawnTimer<=0 && g.enemies.length<220){   // 최대 동시 220 (성능 상한)
    g.spawnTimer=spawnInterval;
    const batch=4+Math.floor(g.time/16);
    for(let i=0;i<batch;i++) spawnEnemy();
  }

  // 기본공격 자동
  g.wpnTimer-=dt;
  const rate=h.wpn.rate/60*g.rateMul;
  if(g.wpnTimer<=0){ g.wpnTimer=rate; fireWeapon(); }

  // 적 이동/공격
  for(const e of g.enemies){
    if(e.dead) continue;
    const dx=g.px-e.x, dy=g.py-e.y; const d=Math.hypot(dx,dy)||1;
    if(e.kind==='archer'){
      // 화면에 보이는 사거리 (줌 고려). 이보다 멀면 못 쏘고 접근한다
      const shootRange=Math.min(W,H)/zoom*0.42;
      const ideal=shootRange*0.7;
      if(d<ideal-30){ e.x-=dx/d*e.spd*dt; e.y-=dy/d*e.spd*dt; }
      else if(d>ideal+30){ e.x+=dx/d*e.spd*1.4*dt; e.y+=dy/d*e.spd*1.4*dt; } // 멀면 빠르게 접근
      e.shootCd-=dt;
      if(e.shootCd<=0 && d<shootRange){ e.shootCd=2.0+Math.random()*1.2; enemyShoot(e,dx/d,dy/d); }
    } else {
      e.x+=dx/d*e.spd*dt; e.y+=dy/d*e.spd*dt;
    }
    // 접촉 대미지
    if(d<e.r+18 && e.kind!=='archer'){
      if(g.buffInvul<=0){ g.hp-=e.dmg*dt; if(g.hp<=0){ g.hp=0; loseGame(); return; } }
    }
  }

  // 아군 투사체
  for(const p of g.projectiles){
    if(p.dead) continue;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if(p.life<=0||p.x<-60||p.x>W+60||p.y<-60||p.y>H+60){ p.dead=true; continue; }
    for(const e of g.enemies){
      if(e.dead||p.hitSet.has(e.id)) continue;
      if(Math.hypot(p.x-e.x,p.y-e.y)<e.r+p.r){
        hitEnemy(e,p.dmg,p.crit); p.hitSet.add(e.id);
        if(p.pierce<=0){ p.dead=true; break; } else p.pierce--;
      }
    }
  }
  // 적 투사체 (궁병)
  for(const p of g.eProjectiles){
    if(p.dead) continue;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if(p.life<=0){ p.dead=true; continue; }
    if(Math.hypot(p.x-g.px,p.y-g.py)<16){
      p.dead=true;
      if(g.buffInvul<=0){ g.hp-=p.dmg; if(g.hp<=0){ g.hp=0; loseGame(); return; } }
    }
  }

  // 근접 판정
  for(const s of g.slashes){
    if(s.done) continue;
    s.age+=dt; if(s.age>=s.dur){ s.done=true; continue; }
    for(const e of g.enemies){
      if(e.dead||s.hitSet.has(e.id)) continue;
      const dx=e.x-s.cx, dy=e.y-s.cy; const dist=Math.hypot(dx,dy);
      if(dist>s.range+e.r) continue;
      if(s.type==='spin'){ hitEnemy(e,s.dmg,s.crit); s.hitSet.add(e.id); if(s.knock) knockback(e,dx,dy,s.knock); }
      else if(s.type==='cone'){
        const ang=Math.atan2(dy,dx); let diff=Math.abs(normAng(ang-s.dir));
        if(diff<s.half){ hitEnemy(e,s.dmg,s.crit); s.hitSet.add(e.id); if(s.knock) knockback(e,dx,dy,s.knock); if(s.stun) e.stun=s.stun; }
      }
    }
  }
  g.slashes=g.slashes.filter(s=>!s.done);

  // 구슬 수집
  for(const o of g.orbs){
    if(o.dead) continue;
    const dx=g.px-o.x, dy=g.py-o.y; const d=Math.hypot(dx,dy);
    if(d<g.pickupR){ o.x+=dx/d*280*dt; o.y+=dy/d*280*dt; }
    if(d<20){ o.dead=true; gainXP(o.v); }
  }

  for(const pt of g.particles){ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=dt; pt.vx*=0.92; pt.vy*=0.92; }
  for(const d of g.damageTexts){ d.y-=40*dt; d.life-=dt; }

  // 청소
  g.enemies.forEach(e=>{ if(e.dead) e.deathAge=(e.deathAge||0)+dt; if(e.stun>0)e.stun-=dt; });
  g.enemies=g.enemies.filter(e=>!(e.dead&&e.deathAge>=0.3));
  g.projectiles=g.projectiles.filter(p=>!p.dead);
  g.eProjectiles=g.eProjectiles.filter(p=>!p.dead);
  g.orbs=g.orbs.filter(o=>!o.dead);
  g.particles=g.particles.filter(p=>p.life>0);
  g.damageTexts=g.damageTexts.filter(d=>d.life>0);

  updateHUD();
}
function normAng(a){ while(a>Math.PI)a-=2*Math.PI; while(a<-Math.PI)a+=2*Math.PI; return a; }
function knockback(e,dx,dy,f){ const d=Math.hypot(dx,dy)||1; e.x+=dx/d*f; e.y+=dy/d*f; }

/* =========================================================
   적 스폰 (병종: 보병/기병/궁병)
   ========================================================= */
let enemyIdSeq=0;
function spawnEnemy(){
  const g=G;
  // 화면(줌 반영) 가장자리 살짝 밖에서 스폰 → 화면 안으로 몰려옴
  const viewR=Math.max(W,H)/zoom*0.62;
  const ang=Math.random()*Math.PI*2, rad=viewR+40+Math.random()*80;
  let x=g.px+Math.cos(ang)*rad, y=g.py+Math.sin(ang)*rad;
  // 월드 밖이면 반대편으로 반사
  x=Math.max(20,Math.min(g.worldW-20,x)); y=Math.max(20,Math.min(g.worldH-20,y));
  const tScale=1+g.time*0.012;
  const roll=Math.random();
  let kind='foot';
  if(roll<0.22) kind='cav';
  else if(roll<0.40) kind='archer';
  const facKeys=Object.keys(FAC_COLOR);
  const fac=facKeys[Math.floor(Math.random()*facKeys.length)];
  let hp,r,spd,dmg,xpv;
  if(kind==='cav'){ hp=16*tScale; r=13; spd=88+Math.random()*24; dmg=16; xpv=2; }
  else if(kind==='archer'){ hp=12*tScale; r=12; spd=48+Math.random()*14; dmg=10; xpv=2; }

function aimDir(){
  const near=nearestEnemy();
  if(near) return Math.atan2(near.y-G.py, near.x-G.px);
  return G.facing>0?0:Math.PI;
}
function fireWeapon(){
  const g=G, w=g.hero.wpn;
  const atkBuff=g.buffAtk>0?1.5:1;
  const dmg=w.dmg*g.dmgMul*atkBuff;
  const range=w.range*g.rangeMul;
  if(w.type==='spin'){
    g.slashes.push({type:'spin', cx:g.px,cy:g.py, range, dmg, dir:0, half:Math.PI, age:0, dur:0.22, hitSet:new Set(), fx:{type:'spin',range}});
    triggerSwing('spin', 0);
  } else if(w.type==='cone'){
    const dir=aimDir();
    g.slashes.push({type:'cone', cx:g.px,cy:g.py, range, dmg, dir, half:Math.PI*0.42, age:0, dur:0.18, hitSet:new Set(), fx:{type:'cone',range,dir}});
    triggerSwing('slash', dir);
  } else if(w.type==='pierce'){
    const dir=aimDir();
    shootProj(dir,520,dmg,range,8+g.pierce,'#e8e0c0',5);

  } else if(w.type==='shoot'){
    const dir=aimDir();
    shootProj(dir,620,dmg,range,1+g.pierce,'#ffe680',4);
    triggerSwing('bow', dir);
  }
}

function shootProj(dir,speed,dmg,range,pierce,col,r){

  g.projectiles.push({ x:g.px,y:g.py, vx:Math.cos(dir)*speed, vy:Math.sin(dir)*speed,

function nearestEnemy(){
  const g=G; let best=null,bd=1e9;
  for(const e of g.enemies){ if(e.dead)continue; const d=Math.hypot(e.x-g.px,e.y-g.py); if(d<bd){bd=d;best=e;} }
  return best;
}

/* =========================================================
   피격/처치 + 크리티컬 이펙트
   ========================================================= */
function hitEnemy(e,dmg,forceCrit){
  const g=G; let d=dmg; let isCrit=false;
  if(forceCrit || (g.crit>0 && Math.random()<g.crit)){ d*=2; isCrit=true; }
  d=Math.round(d); e.hp-=d; e.hitFlash=0.12;
  g.damageTexts.push({x:e.x,y:e.y-e.r,v:d,life:0.5,crit:isCrit});
  if(isCrit && !e.dead) critEffect(e);
  if(e.hp<=0 && !e.dead){
    e.dead=true; e.deathAge=0; g.kills++;
    g.orbs.push({x:e.x,y:e.y,v:e.xpv,dead:false});
    const pc=e.lord?30:(e.kind==='cav'?7:6);
    for(let i=0;i<pc;i++){ const a=Math.random()*Math.PI*2, sp=40+Math.random()*140;
      g.particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4+Math.random()*0.4,col:e.col,r:e.lord?5:3}); }
    g.ultCharge=Math.min(g.ultMax, g.ultCharge+(e.lord?30:(e.kind==='cav'?2.4:1.6))*g.ultRate);
    if(g.ultCharge>=g.ultMax && !g.ultReady){ g.ultReady=true; toast('🐉 필살기 준비! (우하단 버튼)'); vib([20,40,20]); }
    if(g.vamp>0 && Math.random()<g.vamp) g.hp=Math.min(g.maxHp,g.hp+5);
    if(e.lord){ lordDefeated(e); }
    // 100명 단위 마일스톤
    if(Math.floor(g.kills/100) > g.lastMilestone){
      g.lastMilestone=Math.floor(g.kills/100);
      killMilestone(g.lastMilestone*100);
    }
  }
}

   ========================================================= */
function gainXP(v){
  const g=G; g.xp+=v;
  while(g.xp>=g.xpNext){ g.xp-=g.xpNext; g.level++; g.xpNext=Math.round(4+g.level*3.2+g.level*g.level*0.35); openLevelUp(); }
}
function rollUpRarity(){ const total=Object.values(RAR_W).reduce((a,b)=>a+b,0); let r=Math.random()*total;
  for(const [k,w] of Object.entries(RAR_W)){ r-=w; if(r<=0) return k; } return 'c'; }
function openLevelUp(){
  const g=G; g._paused=true;
  const avail=UPGRADES.filter(u=>(g.upLevels[u.id]||0)<u.max);
  const picks=[]; const pool=[...avail];
  for(let i=0;i<3 && pool.length>0;i++){
    let rar=rollUpRarity(); let cand=pool.filter(u=>u.rar===rar); if(cand.length===0) cand=pool;
    const u=cand[Math.floor(Math.random()*cand.length)]; picks.push(u); pool.splice(pool.indexOf(u),1);
  }
  const row=$('upgradeRow'); row.innerHTML='';
  if(picks.length===0){ g.hp=Math.min(g.maxHp,g.hp+40); g._paused=false; return; }
  picks.forEach(u=>{
    const lv=(g.upLevels[u.id]||0);
    const c=document.createElement('div'); c.className='up-card rar-'+u.rar;
    c.innerHTML=`<div class="up-lv">${lv>0?('Lv.'+lv+'→'+(lv+1)):'NEW'}</div>
      <div class="up-ic">${u.ic}</div><div class="up-t">${u.t}</div><div class="up-d">${u.d}</div>`;
    c.onclick=()=>takeUpgrade(u); row.appendChild(c);
  });
  $('lvlHead').textContent='LEVEL '+g.level; show('levelupScreen'); lastT=performance.now();
}
function takeUpgrade(u){ const g=G; g.upLevels[u.id]=(g.upLevels[u.id]||0)+1; u.eff(g); g._paused=false; show(null); lastT=performance.now(); }

/* =========================================================
   렌더링 (줌/카메라 적용)
   ========================================================= */
function render(){
  const g=G; if(!g) return;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1208'; ctx.fillRect(0,0,W,H);

  ctx.save();
  // 카메라: 플레이어 중심 줌 + 흔들림
  const shx=(Math.random()-0.5)*camShake*10, shy=(Math.random()-0.5)*camShake*10;
  // 카메라 중심 = 플레이어, 단 월드 가장자리에선 검은 영역 안 보이게 클램프
  const halfW=W/(2*zoom), halfH=H/(2*zoom);
  let camX=g.px, camY=g.py;
  if(g.worldW>halfW*2) camX=Math.max(halfW, Math.min(g.worldW-halfW, camX)); else camX=g.worldW/2;
  if(g.worldH>halfH*2) camY=Math.max(halfH, Math.min(g.worldH-halfH, camY)); else camY=g.worldH/2;
  ctx.translate(W/2+shx, H/2+shy); ctx.scale(zoom,zoom); ctx.translate(-camX,-camY);

  drawGround();

  // 구슬
  for(const o of g.orbs){
    ctx.beginPath(); ctx.arc(o.x,o.y,4,0,Math.PI*2);
    ctx.fillStyle=o.v>=5?'#c07ae8':'#4a9fe8'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1; ctx.stroke();
  }
  // 근접 이펙트
  for(const s of g.slashes){
    if(!s.fx) continue; const prog=s.age/s.dur;
    ctx.save(); ctx.translate(s.cx,s.cy);
    if(s.fx.type==='spin'){
      ctx.rotate(prog*Math.PI*2);
      ctx.strokeStyle=`rgba(232,220,180,${0.85*(1-prog)})`; ctx.lineWidth=s.fx.big?9:6;
      ctx.beginPath(); ctx.arc(0,0,s.range*0.82,0,Math.PI*1.5); ctx.stroke();
      ctx.strokeStyle=`rgba(255,255,255,${0.6*(1-prog)})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,s.range*0.82,0,Math.PI*1.5); ctx.stroke();
    } else if(s.fx.type==='cone'){
      ctx.rotate(s.fx.dir);
      const alpha=0.75*(1-prog);
      const grad=ctx.createLinearGradient(0,0,s.range,0);
      grad.addColorStop(0,`rgba(232,220,180,${alpha})`); grad.addColorStop(1,'rgba(232,220,180,0)');
      ctx.fillStyle=grad; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,s.range,-s.half,s.half); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
  // 아군 투사체
  for(const p of g.projectiles){ ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=p.col; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1; ctx.stroke(); }
  // 적 투사체
  for(const p of g.eProjectiles){ ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fillStyle='#ff6a4a'; ctx.fill(); }

  // 적
  for(const e of g.enemies){ const a=e.dead?Math.max(0,1-e.deathAge/0.3):1; drawEnemy(e,a); }
  // 플레이어(기마)
  drawHeroMounted();
  // 파티클
  for(const pt of g.particles){ ctx.globalAlpha=Math.max(0,pt.life*2);
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fillStyle=pt.col; ctx.fill(); }
  ctx.globalAlpha=1;
  // 데미지 텍스트
  ctx.textAlign='center';
  for(const d of g.damageTexts){ ctx.globalAlpha=Math.max(0,d.life*2);
    ctx.font=d.crit?'bold 22px sans-serif':'bold 15px sans-serif';
    ctx.fillStyle=d.crit?'#ffd050':'#fff';
    if(d.crit){ ctx.strokeStyle='#a02010'; ctx.lineWidth=3; ctx.strokeText(d.v,d.x,d.y); }
    ctx.fillText(d.v,d.x,d.y); }
  ctx.globalAlpha=1;

  ctx.restore();
}

function drawGround(){
  ctx.strokeStyle='rgba(80,60,36,.22)'; ctx.lineWidth=1;
  const gs=64;
  const x0=Math.floor((G.px-W)/gs)*gs, x1=G.px+W;
  const y0=Math.floor((G.py-H)/gs)*gs, y1=G.py+H;
  for(let x=x0;x<x1;x+=gs){ ctx.beginPath(); ctx.moveTo(x,y0); ctx.lineTo(x,y1); ctx.stroke(); }
  for(let y=y0;y<y1;y+=gs){ ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke(); }
}

/* 병종별 적 그리기 */
function drawEnemy(e,alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  const flash=e.hitFlash>0; if(e.hitFlash>0) e.hitFlash-=0.016;
  const bob=Math.sin((G.animTick*6+e.animP))*2;

  if(e.lord){
    // 적장: 큰 기마 + 깃발
    drawHorse(e.x, e.y+bob, e.r, e.col, flash);
    // 깃발
    ctx.strokeStyle='#3a2a1a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(e.x+e.r*0.5, e.y-e.r*0.6+bob); ctx.lineTo(e.x+e.r*0.5, e.y-e.r*1.8+bob); ctx.stroke();
    ctx.fillStyle=e.col; ctx.beginPath();
    ctx.moveTo(e.x+e.r*0.5, e.y-e.r*1.8+bob); ctx.lineTo(e.x+e.r*1.4, e.y-e.r*1.6+bob); ctx.lineTo(e.x+e.r*0.5, e.y-e.r*1.3+bob); ctx.fill();
    // 이름표
    ctx.globalAlpha=alpha; ctx.textAlign='center'; ctx.font='bold 13px sans-serif';
    ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=3;
    ctx.strokeText(e.lordName, e.x, e.y-e.r-24+bob); ctx.fillText(e.lordName, e.x, e.y-e.r-24+bob);
    // 체력바
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(e.x-e.r,e.y-e.r-16+bob,e.r*2,5);
    ctx.fillStyle='#e8c05a'; ctx.fillRect(e.x-e.r,e.y-e.r-16+bob,e.r*2*(e.hp/e.maxHp),5);
    ctx.restore(); return;
  }

  if(e.kind==='cav'){
    drawHorse(e.x, e.y+bob, e.r, flash?'#fff':e.col, flash);
  } else if(e.kind==='archer'){
    // 궁병: 활 든 보병
    ctx.beginPath(); ctx.arc(e.x,e.y+bob,e.r,0,Math.PI*2);
    ctx.fillStyle=flash?'#fff':e.col; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=2; ctx.stroke();
    // 활
    ctx.strokeStyle='#c9a05a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(e.x+e.r*0.6, e.y+bob, e.r*0.8, -1, 1); ctx.stroke();
    // 눈
    ctx.fillStyle='#1a1008';
    ctx.beginPath(); ctx.arc(e.x-e.r*0.3,e.y-e.r*0.1+bob,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x+e.r*0.3,e.y-e.r*0.1+bob,2,0,Math.PI*2); ctx.fill();
  } else {
    // 보병
    ctx.beginPath(); ctx.arc(e.x,e.y+bob,e.r,0,Math.PI*2);
    ctx.fillStyle=flash?'#fff':e.col; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=2; ctx.stroke();
    // 창
    ctx.strokeStyle='#8a7a5a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(e.x+e.r*0.4,e.y-e.r+bob); ctx.lineTo(e.x+e.r*0.9,e.y-e.r*1.6+bob); ctx.stroke();
    ctx.fillStyle='#1a1008';
    ctx.beginPath(); ctx.arc(e.x-e.r*0.3,e.y-e.r*0.1+bob,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x+e.r*0.3,e.y-e.r*0.1+bob,2,0,Math.PI*2); ctx.fill();
  }
  if(e.stun>0){ // 기절 별
    ctx.globalAlpha=alpha; ctx.fillStyle='#ffe680'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('✦', e.x, e.y-e.r-6+bob);
  }
  ctx.restore();
}

/* 말 그리기 (공용) */
function drawHorse(x,y,r,col,flash){
  ctx.save();
  // 말 몸통
  ctx.fillStyle=flash?'#fff':'#5a4030';
  ctx.beginPath(); ctx.ellipse(x, y+r*0.4, r*1.2, r*0.7, 0, 0, Math.PI*2); ctx.fill();
  // 말 목/머리
  ctx.beginPath(); ctx.ellipse(x-r*1.0, y+r*0.1, r*0.4, r*0.55, -0.5, 0, Math.PI*2); ctx.fill();
  // 다리
  ctx.strokeStyle=flash?'#fff':'#3a2818'; ctx.lineWidth=r*0.22;
  const legOff=Math.sin(G.animTick*10)*3;
  ctx.beginPath(); ctx.moveTo(x-r*0.6,y+r*0.9); ctx.lineTo(x-r*0.6+legOff,y+r*1.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+r*0.6,y+r*0.9); ctx.lineTo(x+r*0.6-legOff,y+r*1.5); ctx.stroke();
  // 기수(라이더)
  ctx.beginPath(); ctx.arc(x+r*0.1, y-r*0.5, r*0.55, 0, Math.PI*2);
  const grad=ctx.createRadialGradient(x-r*0.05,y-r*0.6,2,x+r*0.1,y-r*0.5,r*0.6);
  grad.addColorStop(0,'#f0dcb0'); grad.addColorStop(1,col);
  ctx.fillStyle=flash?'#fff':grad; ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}

/* 주인공 기마 */
function drawHeroMounted(){
  const g=G, h=g.hero, col=FAC_COLOR[h.f];
  ctx.save();
  const face=g.facing;
  ctx.translate(g.px,g.py); ctx.scale(face,1);
  const bob=Math.sin(g.animTick*10)*2.5;
  // 그림자
  ctx.globalAlpha=1;
  ctx.beginPath(); ctx.ellipse(0,28,30,7,0,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fill();
  // === 적토마 (옆모습 실루엣, 왼쪽 향함) ===
  const R=17;
  const horseCol = g.buffSpd>0 ? '#d05a34' : '#7a3f26';
  const horseDark = g.buffSpd>0 ? '#a03a1e' : '#5a2e1a';
  const gallop = g.animTick*13;   // 질주 사이클
  drawWarhorse(R, bob, gallop, horseCol, horseDark);
  // 무장 — 그림이 있으면 그림, 없으면 코드 도트
  const himg = HERO_IMG[h.n];
  if(himg){
    // 말 위 상반신 위치에 그림 배치 (약간 크게)
    const isz=R*2.6;
    ctx.save();
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(himg, -isz/2+R*0.1, -isz*0.72+bob, isz, isz);
    ctx.restore();
  } else {
    // 무장 몸통
    ctx.beginPath(); ctx.arc(R*0.1,-R*0.5+bob,R*0.7,0,Math.PI*2);
    const grad=ctx.createRadialGradient(R*0.0,-R*0.7+bob,2,R*0.1,-R*0.5+bob,R*0.8);
    grad.addColorStop(0,'#f0dcb0'); grad.addColorStop(1,col);
    ctx.fillStyle=grad; ctx.fill(); ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();
    // 투구
    ctx.beginPath(); ctx.arc(R*0.1,-R*0.8+bob,R*0.5,Math.PI,0); ctx.fillStyle=col; ctx.fill();
    ctx.beginPath(); ctx.arc(R*0.1,-R*1.3+bob,2.5,0,Math.PI*2); ctx.fillStyle='#e8c05a'; ctx.fill();
  }
  // 무기 — 휘두르는 모션
  drawWeaponSwing(R, bob, col);
  // 무적 버프 오라
  if(g.buffInvul>0){ ctx.globalAlpha=0.5+Math.sin(g.animTick*12)*0.2;
    ctx.strokeStyle='#7ac0ff'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(R*0.1,-R*0.2+bob,R*1.6,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
  ctx.restore();
}

/* 군마(적토마) 옆모습 — drawHeroMounted 로컬 좌표계, 왼쪽 향함 */
function drawWarhorse(R, bob, gallop, col, dark){
  const y0 = bob;
  const sw1 = Math.sin(gallop);
  const sw2 = Math.sin(gallop+Math.PI);
  ctx.save();
  ctx.translate(0, y0);
  ctx.lineCap='round';

  // === 뒤쪽 다리 2개 (먼저, 몸통 뒤에) ===
  ctx.strokeStyle=dark; ctx.lineWidth=5;
  drawLeg(R*1.25, R*0.35, sw2, R);      // 뒷다리(먼쪽)
  drawLeg(-R*1.05, R*0.35, sw1, R);     // 앞다리(먼쪽)

  // === 몸통 === (등이 평평하고 배가 둥근 말 체형)
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(-R*1.25, -R*0.25);                          // 앞가슴 위
  ctx.quadraticCurveTo(-R*0.3,-R*0.62, R*0.9,-R*0.5);    // 등 (평평)
  ctx.quadraticCurveTo(R*1.55,-R*0.42, R*1.7,-R*0.05);   // 엉덩이
  ctx.quadraticCurveTo(R*1.78, R*0.3, R*1.5, R*0.4);     // 엉덩이 뒤 아래
  ctx.quadraticCurveTo(R*0.4, R*0.62, -R*0.9, R*0.42);   // 배
  ctx.quadraticCurveTo(-R*1.45, R*0.3, -R*1.4,-R*0.05);  // 앞다리 앞선
  ctx.quadraticCurveTo(-R*1.4,-R*0.18,-R*1.25,-R*0.25);
  ctx.closePath(); ctx.fill();

  // === 목 + 머리 (앞=왼쪽, 위로 솟았다 아래로) ===
  ctx.beginPath();
  ctx.moveTo(-R*1.1, -R*0.4);                            // 목 뿌리(어깨 위)
  ctx.quadraticCurveTo(-R*1.75,-R*0.75, -R*2.0,-R*0.55); // 목 앞선 → 이마
  ctx.quadraticCurveTo(-R*2.35,-R*0.4, -R*2.5,-R*0.05);  // 콧대
  ctx.lineTo(-R*2.45, R*0.18);                            // 주둥이 끝
  ctx.lineTo(-R*2.2, R*0.2);                              // 입 아래
  ctx.quadraticCurveTo(-R*2.0, R*0.05, -R*1.85,-R*0.1);  // 턱선
  ctx.quadraticCurveTo(-R*1.4, R*0.05, -R*1.0,-R*0.05);  // 목 뒷선 → 가슴
  ctx.closePath(); ctx.fill();

  // 귀
  ctx.beginPath();
  ctx.moveTo(-R*1.95,-R*0.6); ctx.lineTo(-R*2.05,-R*0.9); ctx.lineTo(-R*1.78,-R*0.62);
  ctx.closePath(); ctx.fill();

  // 갈기 (목 뒷선을 따라 뭉치들)
  ctx.strokeStyle=dark; ctx.lineWidth=3;
  for(let i=0;i<=6;i++){ const t=i/6;
    const bx=-R*1.05 - t*R*0.95, by=-R*0.42 - t*R*0.28;
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+R*0.14, by+R*0.34); ctx.stroke(); }

  // 눈
  ctx.fillStyle='#120c06';
  ctx.beginPath(); ctx.arc(-R*1.95,-R*0.38, R*0.1, 0, Math.PI*2); ctx.fill();

  // === 꼬리 (뒤=오른쪽) ===
  ctx.strokeStyle=dark; ctx.lineWidth=6;
  const tsw=Math.sin(gallop*0.6)*R*0.18;
  ctx.beginPath();
  ctx.moveTo(R*1.68,-R*0.05);
  ctx.quadraticCurveTo(R*2.15, R*0.35+tsw, R*1.95, R*0.95+tsw);
  ctx.stroke();
  ctx.lineWidth=3.5;
  ctx.beginPath();
  ctx.moveTo(R*1.7, R*0.02);
  ctx.quadraticCurveTo(R*2.3, R*0.4+tsw, R*2.15, R*1.05+tsw);
  ctx.stroke();

  // === 가까운 앞다리 2개 (몸통 위 덮어그림) ===
  ctx.strokeStyle=col; ctx.lineWidth=6;
  drawLeg(-R*1.0, R*0.35, sw2, R);      // 앞다리(가까운쪽)
  drawLeg(R*1.3, R*0.35, sw1, R);       // 뒷다리(가까운쪽)

  ctx.restore();
}
/* 다리: 어깨(hx,hy)→무릎→발굽, sw=질주 스윙(-1~1) */
function drawLeg(hx, hy, sw, R){
  const kneeX=hx + sw*R*0.35;
  const kneeY=hy + R*0.62;
  const hoofX=hx + sw*R*0.7;
  const hoofY=hy + R*1.35;
  ctx.beginPath();
  ctx.moveTo(hx,hy); ctx.lineTo(kneeX,kneeY); ctx.lineTo(hoofX,hoofY); ctx.stroke();
  ctx.save(); ctx.fillStyle='#1e120a';
  ctx.beginPath(); ctx.arc(hoofX,hoofY,R*0.14,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

/* 무기 휘두르기 모션 — drawHeroMounted 로컬 좌표계(face 스케일 적용됨) 안에서 호출 */
function drawWeaponSwing(R, bob, col){
  const g=G;
  // 어깨(무기 손잡이) 위치
  const sx=R*0.35, sy=-R*0.55+bob;
  // 스윙 진행도 0(시작)~1(끝). 없으면 대기 자세
  const prog = g.swingT>0 ? 1-(g.swingT/g.swingDur) : -1;
  const type = g.swingType;

  ctx.save();
  ctx.translate(sx, sy);

  if(prog<0){
    // 대기: 무기를 비스듬히 세워 든 자세 (살짝 흔들림)
    const idle=Math.sin(g.animTick*4)*0.06;
    drawBlade(type, -0.9+idle, R, col, 1);
    ctx.restore(); return;
  }

  if(type==='slash' || type==='spin'){
    // 위(-2.4rad)에서 아래-앞(0.5rad)으로 내려베기, ease-out
    const e=1-Math.pow(1-prog,2);
    const ang=-2.4 + e*2.9;
    // 잔상 트레일 (여러 각도 반투명)
    for(let i=1;i<=4;i++){
      const t=Math.max(0, e-i*0.12);
      const a=-2.4+t*2.9;
      drawBlade(type, a, R, col, 0.14*(4-i));
    }
    drawBlade(type, ang, R, col, 1);
    // 참격 호 트레일
    ctx.globalAlpha=0.5*(1-prog);
    ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0, R*1.5, -2.4, ang); ctx.stroke();
    ctx.globalAlpha=1;
  }
  else if(type==='thrust'){
    // 앞으로 찌르기: 0~0.5 전진, 0.5~1 복귀
    const ext = prog<0.5 ? (prog/0.5) : (1-(prog-0.5)/0.5);
    const reach = R*0.4 + ext*R*1.4;
    ctx.save();
    ctx.rotate(-0.15);
    // 창대
    ctx.strokeStyle='#7a5a34'; ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.moveTo(-R*0.3,0); ctx.lineTo(reach,0); ctx.stroke();
    // 창날
    ctx.fillStyle='#e8e0c8'; ctx.beginPath();
    ctx.moveTo(reach,0); ctx.lineTo(reach-R*0.5,-R*0.18); ctx.lineTo(reach-R*0.35,0); ctx.lineTo(reach-R*0.5,R*0.18); ctx.closePath(); ctx.fill();
    // 잔상
    ctx.globalAlpha=0.4*ext; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(reach-R*1.2,0); ctx.lineTo(reach,0); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.restore();
  }
  else if(type==='bow'){
    // 활 당겼다 놓기
    const draw = prog<0.4 ? (prog/0.4) : (1-(prog-0.4)/0.6);
    ctx.strokeStyle='#c9a05a'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(R*0.5, 0, R*0.9, -1.1, 1.1); ctx.stroke();
    // 시위
    ctx.strokeStyle='rgba(240,230,200,.8)'; ctx.lineWidth=1.2;
    const bx=R*0.5+Math.cos(-1.1)*R*0.9, by=Math.sin(-1.1)*R*0.9;
    const ex=R*0.5+Math.cos(1.1)*R*0.9, ey=Math.sin(1.1)*R*0.9;
    const pull=R*(0.1 - draw*0.5);
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(R*0.5+pull,0); ctx.lineTo(ex,ey); ctx.stroke();
  }
  ctx.restore();
}

/* 칼/도 한 자루를 주어진 각도로 그림 */
function drawBlade(type, ang, R, col, alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.rotate(ang);
  const len = (type==='spin') ? R*2.0 : R*1.8;
  // 자루
  ctx.strokeStyle='#5a3a22'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(len*0.32,0); ctx.stroke();
  // 날 (청룡언월도풍: 끝이 넓어지는 곡도)
  ctx.strokeStyle='#e2ddc8'; ctx.lineWidth=4.5;
  ctx.beginPath(); ctx.moveTo(len*0.32,0); ctx.lineTo(len,0); ctx.stroke();
  // 날 하이라이트
  ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(len*0.34,-1); ctx.lineTo(len*0.98,-1); ctx.stroke();
  // 언월도 갈고리 (spin 계열만)
  if(type==='spin'){
    ctx.fillStyle='#e2ddc8'; ctx.beginPath();
    ctx.moveTo(len*0.78,0); ctx.quadraticCurveTo(len*0.95,-R*0.4, len*1.05,-R*0.12);
    ctx.quadraticCurveTo(len*0.92,-R*0.02, len*0.78,0); ctx.fill();
  }
  ctx.restore();
}

/* =========================================================
   HUD
   ========================================================= */
function updateHUD(){
  const g=G; if(!g) return;
  $('xpFill').style.width=(g.xp/g.xpNext*100)+'%';
  $('lvlBadge').textContent='Lv.'+g.level;
  const t=Math.floor(g.time); const mm=String(Math.floor(t/60)).padStart(2,'0'); const ss=String(t%60).padStart(2,'0');
  $('timer').textContent=mm+':'+ss;
  $('kills').textContent='☠ '+g.kills;
  $('hpFill').style.width=(g.hp/g.maxHp*100)+'%';
  $('hpLabel').textContent=Math.ceil(g.hp)+' / '+g.maxHp;
  // 스킬 쿨다운 오버레이 (남은 비율)
  const s1r=g.s1cd>0? g.s1cd/(g.hero.s1.cd*g.cdrMul):0;
  const s2r=g.s2cd>0? g.s2cd/(g.hero.s2.cd*g.cdrMul):0;
  $('s1cd').style.height=(s1r*100)+'%'; $('s2cd').style.height=(s2r*100)+'%';
  $('ultcd').style.height=g.ultReady?'0%':((1-g.ultCharge/g.ultMax)*100)+'%';
  $('skill1Btn').classList.toggle('ready', g.s1cd<=0);
  $('skill2Btn').classList.toggle('ready', g.s2cd<=0);
  $('ultBtn').classList.toggle('ready', g.ultReady);
}

/* =========================================================
   승패
   ========================================================= */
function winGame(){
  G.gameOver=true; endLoop(); $('hud').classList.remove('on');
  $('resultTitle').className='result-title win'; $('resultTitle').textContent='생 환';
  showResult('300초 생존 달성!');
}
function loseGame(){
  G.gameOver=true; endLoop(); $('hud').classList.remove('on');
  $('resultTitle').className='result-title lose'; $('resultTitle').textContent='전 사';
  const t=Math.floor(G.time); const mm=String(Math.floor(t/60)).padStart(2,'0'); const ss=String(t%60).padStart(2,'0');
  showResult(`${mm}:${ss} 에서 전사`); vib([100,50,100]);
}
function showResult(sub){
  const g=G;
  $('resultStat').innerHTML=`<b style="color:${FAC_COLOR[g.hero.f]}">${g.hero.n}</b> · ${sub}<br><br>`+
    `처치 <b style="color:#e8756a">${g.kills}</b>명<br>도달 레벨 ${g.level}`;
  setTimeout(()=>show('resultScreen'),600);
}

resize();
preloadHeroImages();
